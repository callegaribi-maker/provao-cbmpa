<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado por Matéria – CBMPA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d1a;color:#ecf0f1;min-height:100vh}
header{background:linear-gradient(135deg,#1a237e,#283593);padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
header h1{font-size:16px;font-weight:900}
header p{font-size:11px;opacity:.7;margin-top:2px}
.progress-bar{height:4px;background:rgba(255,255,255,.1)}
.progress-fill{height:100%;background:linear-gradient(90deg,#3949ab,#7986cb);transition:width .3s;width:0}

/* Seletor de matéria */
#subject-select{max-width:720px;margin:0 auto;padding:28px 16px}
.sel-title{font-size:22px;font-weight:900;margin-bottom:6px}
.sel-sub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:24px}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.subj-card{background:#16213e;border:2px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 16px;cursor:pointer;transition:all .2s;text-align:center}
.subj-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.25)}
.subj-card .icon{font-size:32px;margin-bottom:10px;display:block}
.subj-card h3{font-size:14px;font-weight:800;margin-bottom:6px}
.subj-card p{font-size:11px;color:rgba(255,255,255,.5)}
.subj-card.done{border-color:#2ecc71}
.subj-card.done h3{color:#2ecc71}

/* Quiz */
#quiz-area{display:none;max-width:720px;margin:0 auto;padding:20px 16px 100px}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.quiz-header h2{font-size:16px;font-weight:800}
.q-counter{font-size:12px;background:rgba(255,255,255,.1);padding:5px 12px;border-radius:20px}

.q-card{background:#16213e;border-radius:18px;padding:24px 20px;border:2px solid rgba(255,255,255,.07)}
.diff-badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800;text-transform:uppercase;margin-bottom:12px}
.db-f{background:rgba(46,204,113,.2);color:#2ecc71;border:1px solid rgba(46,204,113,.3)}
.db-m{background:rgba(243,156,18,.2);color:#f39c12;border:1px solid rgba(243,156,18,.3)}
.db-d{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid rgba(231,76,60,.3)}

.q-text{font-size:15px;font-weight:600;line-height:1.55;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:9px}
.opt{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.09);border-radius:12px;padding:13px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .2s;font-size:14px;line-height:1.4}
.opt:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2)}
.opt.selected{background:rgba(57,73,171,.25);border-color:#5c6bc0}
.opt-l{font-weight:800;min-width:18px;color:#7986cb;flex-shrink:0}

.nav-btns{display:flex;gap:10px;margin-top:18px}
.btn-prev,.btn-next,.btn-submit{flex:1;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
.btn-prev{background:rgba(255,255,255,.08);color:white}
.btn-prev:hover{background:rgba(255,255,255,.15)}
.btn-next{background:#3949ab;color:white}
.btn-next:hover{background:#283593}
.btn-submit{background:#c0392b;color:white;display:none}
.btn-submit:hover{background:#a93226}

/* Dots de progresso */
.q-dots{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.12);transition:.2s;cursor:pointer}
.dot.answered{background:#3949ab}
.dot.current{background:#7986cb;transform:scale(1.3)}

/* Resultado */
#result-area{display:none;max-width:720px;margin:0 auto;padding:20px 16px 80px}
.res-header{text-align:center;padding:28px 20px;background:#16213e;border-radius:20px;margin-bottom:24px}
.res-emoji{font-size:60px;margin-bottom:12px}
.res-score{font-size:44px;font-weight:900}
.res-pct{font-size:17px;color:rgba(255,255,255,.6);margin-bottom:16px}
.res-msg{font-size:15px;font-weight:700;padding:12px 18px;background:rgba(255,255,255,.06);border-radius:12px}

.res-by-diff{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap}
.rbd-card{flex:1;min-width:120px;border-radius:14px;padding:16px 12px;text-align:center}
.rbd-f{background:rgba(46,204,113,.12);border:2px solid rgba(46,204,113,.3)}
.rbd-m{background:rgba(243,156,18,.12);border:2px solid rgba(243,156,18,.3)}
.rbd-d{background:rgba(231,76,60,.12);border:2px solid rgba(231,76,60,.3)}
.rbd-title{font-size:11px;font-weight:800;margin-bottom:6px}
.rbd-num{font-size:26px;font-weight:900;line-height:1}
.rbd-sub{font-size:10px;opacity:.65;margin-top:3px}

/* Gabarito */
.gab-section{margin-top:10px}
.gab-q{background:#16213e;border-radius:14px;padding:18px 16px;margin-bottom:12px;border-left:4px solid transparent}
.gab-q.gq-ok{border-left-color:#2ecc71}
.gab-q.gq-err{border-left-color:#e74c3c}
.gab-q.gq-skip{border-left-color:#95a5a6}
.gab-num{font-size:11px;font-weight:800;color:rgba(255,255,255,.45);margin-bottom:6px}
.gab-qtext{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:10px}
.gab-ans{font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:5px}
.gab-ans.ga-ok{background:rgba(46,204,113,.15);color:#2ecc71}
.gab-ans.ga-err{background:rgba(231,76,60,.15);color:#e74c3c}
.gab-ans.ga-correct{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:#a8e6c3}
.gab-exp{font-size:12px;line-height:1.5;color:rgba(255,255,255,.6);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}

.res-btns{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.rbtn{flex:1;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:block}
.rbtn-retry{background:#3949ab;color:white}
.rbtn-menu{background:rgba(255,255,255,.08);color:white;border:2px solid rgba(255,255,255,.15)}
.rbtn-email{background:rgba(255,255,255,.06);color:white;border:2px solid rgba(255,255,255,.12)}

.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.ftab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.6);transition:.2s}
.ftab.active{background:#3949ab;border-color:#3949ab;color:white}
</style>
</head>
<body>

<header>
  <h1>📋 Simulado por Matéria – CBMPA</h1>
  <p id="hd-sub">Escolha uma matéria para iniciar</p>
</header>
<div class="progress-bar"><div class="progress-fill" id="prog"></div></div>

<!-- Seletor de matéria -->
<div id="subject-select">
  <div class="sel-title">Escolha a Matéria</div>
  <div class="sel-sub">20 questões por matéria · Fácil, Moderado e Difícil · Gabarito apenas no final</div>
  <div class="subject-grid" id="subject-grid"></div>
</div>

<!-- Quiz -->
<div id="quiz-area">
  <div class="quiz-header">
    <h2 id="quiz-title"></h2>
    <div class="q-counter" id="q-counter">1 / 20</div>
  </div>
  <div class="q-dots" id="q-dots"></div>
  <div class="q-card" id="q-card">
    <div class="diff-badge" id="diff-badge"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="nav-btns">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()">← Anterior</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()">Próxima →</button>
      <button class="btn-submit" id="btn-submit" onclick="submitQuiz()">✅ Ver Gabarito</button>
    </div>
  </div>
</div>

<!-- Resultado -->
<div id="result-area"></div>

<script>
const LETTERS = ['A','B','C','D','E'];
const DIFF_LABEL = {F:'🟢 Fácil', M:'🟡 Moderado', D:'🔴 Difícil'};
const DIFF_CLS   = {F:'db-f', M:'db-m', D:'db-d'};

const SUBJECTS = [
  {id:'im',  name:'Instrução Militar',      icon:'🎖️'},
  {id:'dc',  name:'Defesa Civil',           icon:'🛡️'},
  {id:'aph', name:'APH',                    icon:'🚑'},
  {id:'st',  name:'Salv. Terrestre',        icon:'⛏️'},
  {id:'op',  name:'OP Perigosos',           icon:'☢️'},
  {id:'aq',  name:'Aquático',               icon:'🌊'},
  {id:'sa',  name:'Salv. em Altura',        icon:'🧗'},
  {id:'sv',  name:'Salv. Veicular',         icon:'🚗'},
  {id:'tmi', name:'TMI',                    icon:'🔥'},
  {id:'if',  name:'Inc. Florestal',         icon:'🌲'},
];

// ── BANCO DE QUESTÕES ───────────────────────────────────────────────────────
const QUESTIONS = {

im: [
  {d:'F', q:'Na posição de "Sentido", os calcanhares ficam unidos e os pés formam ângulo de:', opts:['30°','45°','60°','90°','180°'], ans:2, exp:'Na posição de sentido os pés formam 60° entre si, calcanhares juntos.'},
  {d:'F', q:'O comando "Descansar" permite ao militar:', opts:['Sentar no chão','Mover a perna esquerda à vontade mantendo o direito fixo','Falar à vontade','Abandonar a formação','Remover o fardamento'], ans:1, exp:'Descansar: perna esquerda afasta, braços soltos atrás, pé direito fixo.'},
  {d:'F', q:'A continência (saludo) deve ser realizada a que distância mínima de uma autoridade?', opts:['2 passos','4 passos','6 passos','8 passos','10 passos'], ans:2, exp:'A continência é prestada a partir de 6 passos de distância da autoridade.'},
  {d:'F', q:'O passo ordinário é o passo padrão de marcha com cadência de:', opts:['90 p/min','100 p/min','114 p/min','120 p/min','130 p/min'], ans:2, exp:'Passo ordinário: 114 passos/minuto, comprimento de 75 cm.'},
  {d:'F', q:'Em formaturas, quem tem a responsabilidade de alinhar a tropa à direita?', opts:['O último da fila','O soldado mais alto','O guia de referência à direita','O comandante','O suboficial'], ans:2, exp:'O guia (referência) de alinhamento fica à direita e os demais se alinham por ele.'},
  {d:'F', q:'O toque de corneta "Sentido" antecede qual momento?', opts:['Início do rancho','Hasteamento da bandeira','Início do exercício físico','Descanso noturno','Início da aula'], ans:1, exp:'O toque "Sentido" é executado antes do hasteamento/arriamento da bandeira nacional.'},
  {d:'M', q:'"Meia Volta Volver" executa-se em quantos tempos e sobre qual pé?', opts:['1 tempo / pé direito','2 tempos / pé esquerdo','2 tempos / pé direito','3 tempos / ambos','1 tempo / ambos'], ans:1, exp:'Meia Volta Volver: 2 tempos — giro 180° no calcanhar esquerdo, aproxima pé direito.'},
  {d:'M', q:'O comando "Firme" determina que o militar:', opts:['Corra ao local','Assuma posição de sentido imediatamente','Bata continência','Alinhe com os demais','Grite "Presente"'], ans:1, exp:'"Firme" = posição de sentido. É o executivo que corresponde ao preparatório "Atenção".'},
  {d:'M', q:'No passo acelerado, a cadência é de quantos passos por minuto?', opts:['114','120','160','180','200'], ans:2, exp:'Passo acelerado: 160 passos/minuto, comprimento de 83 cm.'},
  {d:'M', q:'Qual o comprimento do passo ordinário?', opts:['60 cm','65 cm','70 cm','75 cm','80 cm'], ans:3, exp:'Passo ordinário: 75 cm de comprimento, 114 p/min.'},
  {d:'M', q:'A ordem "Alto" em marcha é executada quando o pé _____ toca o solo:', opts:['Esquerdo — pára imediatamente','Direito — ainda dá um passo com o esquerdo','Esquerdo — ainda dá 2 passos','Direito — pára imediatamente','Qualquer pé — pára em 3 tempos'], ans:1, exp:'"Alto": dado quando o pé direito toca o solo; o militar completa mais um passo com o esquerdo e para.'},
  {d:'M', q:'A continência sentado (dentro de viatura ou à mesa) é feita:', opts:['Levantando-se','Com a mão direita na têmpora, corpo ereto','Inclinando a cabeça','Com olhar fixo à frente, sem gesto','Batendo o pé no chão'], ans:3, exp:'Dentro de viatura ou sentado: olhar fixo na direção da autoridade, sem gesto manual.'},
  {d:'M', q:'Qual o significado da palavra de ordem "Volver" sem prefixo?', opts:['Girar 45°','Girar 90°','Girar 180°','Girar 270°','Marchar à vontade'], ans:2, exp:'"Volver" isolado = Meia Volta = 180°. "Direita Volver" = 90° à direita.'},
  {d:'M', q:'O alinhamento em coluna (fila única) é sempre realizado pela:', opts:['Direita','Esquerda','Centro','Pelo mais alto','Pelo comandante'], ans:0, exp:'Em coluna (fila única), o alinhamento é sempre pela direita, com o guia à frente.'},
  {d:'D', q:'Em solenidade com Bandeira Nacional, o militar sem armamento presta honras:', opts:['Permanecendo em repouso','Executando "Sentido" e voltando a cabeça para a bandeira','Executando "Sentido" sem movimentar a cabeça','Batendo continência durante toda a passagem','Ajoelhando-se'], ans:1, exp:'Sem armamento: posição de sentido com cabeça voltada para a bandeira durante a execução do Hino Nacional.'},
  {d:'D', q:'No desfile, o "passo de parada" brasileiro tem cadência e comprimento de:', opts:['100 p/min – 65 cm','114 p/min – 60 cm','88 p/min – 50 cm','100 p/min – 80 cm','114 p/min – 75 cm'], ans:0, exp:'Passo de parada (estilo brasileiro): 100 passos/minuto, comprimento de 65 cm, perna elevada.'},
  {d:'D', q:'Qual a posição correta do armamento no "Apresentar Armas" com fuzil?', opts:['Fuzil vertical à frente do corpo, coronha no chão','Fuzil inclinado à frente, coronha na altura do quadril','Fuzil na vertical, junto ao ombro direito, cano para cima','Fuzil horizontal à altura do peito','Fuzil apoiado no ombro, cano para baixo'], ans:2, exp:'"Apresentar Armas" com fuzil: arma na vertical junto ao ombro direito, cano para cima, mão esquerda na guarda.'},
  {d:'D', q:'O "Recolher" (recolher do guarda) ocorre quando:', opts:['O militar vai dormir','O último serviço do dia é encerrado, sinalizando o fim das atividades','O comandante é substituído','A bandeira é hasteada','O rancho é servido'], ans:1, exp:'"Recolher" sinaliza o encerramento das atividades do quartel ao final do dia — toque de corneta correspondente.'},
  {d:'D', q:'No "Direita Volver" em marcha, o giro de 90° é executado quando o pé _____ toca o solo:', opts:['Esquerdo','Direito','Qualquer','Esquerdo, completando com o direito','Direito, parando ali mesmo'], ans:0, exp:'"Direita Volver" em marcha: dado o comando quando o pé esquerdo toca o solo; gira-se 90° à direita.'},
  {d:'D', q:'A "Forma" (reunir a tropa em formatura) deve ser executada em quanto tempo após o toque de corneta?', opts:['30 segundos','1 minuto','O mais rápido possível, sem tempo fixo no regulamento','5 minutos','3 minutos'], ans:2, exp:'O regulamento não fixa tempo exato — determina que a tropa deve se apresentar com a maior brevidade possível após o toque.'},
],

dc: [
  {d:'F', q:'O SINPDEC é coordenado em nível federal pelo:', opts:['Ministério da Saúde','Exército Brasileiro','Ministério da Integração e Desenvolvimento Regional','IBGE','Corpo de Bombeiros Federal'], ans:2, exp:'O Sistema Nacional de Proteção e Defesa Civil (SINPDEC) é coordenado pelo Ministério da Integração e Desenvolvimento Regional.'},
  {d:'F', q:'A Defesa Civil atua em quatro fases do ciclo de desastres. Qual NÃO faz parte?', opts:['Prevenção','Preparação','Punição','Resposta','Recuperação'], ans:2, exp:'As quatro fases são: Prevenção, Preparação, Resposta e Recuperação. "Punição" não é uma fase.'},
  {d:'F', q:'Qual escala mede a intensidade dos terremotos com base na energia liberada?', opts:['Saffir-Simpson','Fujita','Mercalli','Richter','Beaufort'], ans:3, exp:'A escala Richter (magnitude) mede a energia liberada pelo terremoto. Mercalli mede os efeitos sentidos.'},
  {d:'F', q:'A Defesa Civil Municipal é coordenada pelo:', opts:['Governador','Prefeito','Secretário de Segurança','Comandante dos Bombeiros','Presidente da República'], ans:1, exp:'A COMDEC (Coordenadoria Municipal de Defesa Civil) é presidida pelo Prefeito.'},
  {d:'F', q:'Desastre de origem NATURAL causado por excesso de água no solo é:', opts:['Vendaval','Granizo','Escorregamento (deslizamento)','Seca','Terremoto'], ans:2, exp:'Escorregamentos (deslizamentos) são deflagrados pelo excesso de saturação de água no solo.'},
  {d:'F', q:'A sigla NUDEC significa:', opts:['Núcleo de Defesa Civil','Núcleo de Desenvolvimento Civil','Núcleo de Desastres Civis','Nível de Urgência em Defesa Civil','Nenhuma alternativa'], ans:0, exp:'NUDEC = Núcleo Comunitário de Defesa Civil, formado por voluntários em bairros e comunidades.'},
  {d:'M', q:'O COBRADE (Classificação Brasileira de Desastres) substituiu qual sistema anterior?', opts:['CEDEC','AVADAN','CODAR','SINPDEC','NUDEC'], ans:2, exp:'O COBRADE, instituído pela IN 01/2012 da SEDEC, substituiu o CODAR (Codificação de Desastres).'},
  {d:'M', q:'Qual documento formaliza o reconhecimento federal de situação de emergência?', opts:['Decreto Municipal','Portaria do Prefeito','Portaria do Ministério da Integração','Decreto Presidencial','Resolução do CONAMA'], ans:2, exp:'A Portaria do Ministério da Integração (hoje MI) reconhece federalmente a Situação de Emergência ou Estado de Calamidade Pública.'},
  {d:'M', q:'A "Situação de Emergência" difere do "Estado de Calamidade Pública" porque:', opts:['É declarada somente pelo Presidente','Afeta área maior','O município ainda tem capacidade parcial de resposta','Dura menos de 24h','Ocorre apenas em áreas urbanas'], ans:2, exp:'Na Situação de Emergência a capacidade de resposta está parcialmente comprometida; no Estado de Calamidade está totalmente comprometida.'},
  {d:'M', q:'O fenômeno El Niño provoca, em geral, no Norte/Nordeste do Brasil:', opts:['Excesso de chuvas','Redução de chuvas e seca','Queda de granizo','Aumento de terremotos','Enchentes costeiras'], ans:1, exp:'El Niño reduz as chuvas no Norte e Nordeste (seca), enquanto aumenta no Sul do Brasil.'},
  {d:'M', q:'A escala Fujita classifica a intensidade de:', opts:['Furacões','Tornados','Terremotos','Tsunamis','Vendavais'], ans:1, exp:'A escala Fujita (F0 a F5) classifica tornados pela velocidade dos ventos e danos causados.'},
  {d:'M', q:'O mapa de risco de um município deve ser elaborado pela Defesa Civil em parceria com:', opts:['Apenas o Corpo de Bombeiros','Apenas o IBGE','Prefeitura, comunidade e órgãos técnicos','Somente engenheiros credenciados','Defesa Civil Estadual, sem participação local'], ans:2, exp:'O mapa de risco deve ser elaborado participativamente: poder público, técnicos e a própria comunidade.'},
  {d:'M', q:'O AVADAN é um formulário utilizado para:', opts:['Declarar estado de calamidade','Avaliar danos e prejuízos após desastre','Solicitar auxílio federal preventivo','Cadastrar voluntários','Registrar óbitos em desastre'], ans:1, exp:'AVADAN = Avaliação de Danos. Formulário preenchido após o desastre para quantificar perdas humanas e materiais.'},
  {d:'M', q:'Enchentes e inundações diferem porque:', opts:['Enchente é em rios, inundação é no mar','Enchente é gradual, inundação é repentina (enxurrada)','Enchente é o aumento do nível do rio com transbordamento, inundação é o mesmo com maior rapidez','Não há diferença técnica','Enchente é COBRADE natural, inundação é COBRADE tecnológico'], ans:2, exp:'Enchente/cheia: aumento gradual com possível transbordamento. Inundação: transbordamento efetivo. Enxurrada: fluxo rápido e violento.'},
  {d:'D', q:'A Lei Federal 12.608/2012 instituiu:', opts:['O Corpo de Bombeiros Federal','O SINPDEC e a Política Nacional de Proteção e Defesa Civil','O COBRADE','A obrigatoriedade de NUDEC em todo município','O Fundo Nacional de Defesa Civil'], ans:1, exp:'A Lei 12.608/2012 instituiu a Política Nacional de Proteção e Defesa Civil (PNPDEC) e o SINPDEC.'},
  {d:'D', q:'O "índice de vulnerabilidade" em Defesa Civil avalia:', opts:['Apenas perdas financeiras','A capacidade de resposta exclusivamente','A exposição + suscetibilidade da população ao risco','Somente a probabilidade do evento','A frequência histórica de desastres'], ans:2, exp:'Vulnerabilidade = exposição ao perigo + suscetibilidade da população + capacidade de adaptação/resposta.'},
  {d:'D', q:'Qual é a diferença entre "ameaça" (hazard) e "risco" em Defesa Civil?', opts:['São sinônimos','Ameaça é o evento potencial; risco é a probabilidade de dano considerando a vulnerabilidade','Risco é o evento; ameaça é a consequência','Ameaça é natural; risco é tecnológico','Risco é calculado por engenheiros; ameaça pela Defesa Civil'], ans:1, exp:'Ameaça (hazard): evento perigoso potencial. Risco: combinação da ameaça com a vulnerabilidade da população exposta.'},
  {d:'D', q:'O FIDE (Formulário de Informação de Desastre) deve ser enviado à SEDEC em até:', opts:['24 horas','48 horas','72 horas','5 dias','10 dias'], ans:1, exp:'O FIDE deve ser enviado em até 48 horas após a ocorrência do desastre para o registro e acionamento de recursos.'},
  {d:'D', q:'Qual instrumento legal permite ao Prefeito decretar Situação de Emergência sem aprovação da Câmara?', opts:['Lei Orgânica Municipal','Decreto Municipal autônomo','A Constituição Federal (art. 144)','A Lei 12.608/2012 (art. 7º)','Medida Provisória'], ans:3, exp:'O art. 7º da Lei 12.608/2012 autoriza o Prefeito a decretar Situação de Emergência ou Estado de Calamidade por ato próprio (decreto), sem necessidade de aprovação legislativa prévia.'},
  {d:'D', q:'Em Defesa Civil, "resiliência" significa:', opts:['Resistência total ao desastre','Capacidade de absorver impactos, adaptar-se e recuperar-se','Ausência de vulnerabilidade','Planejamento preventivo exclusivo','Velocidade de evacuação'], ans:1, exp:'Resiliência: capacidade de um sistema (comunidade/estrutura) de absorver perturbações, reorganizar-se e manter suas funções essenciais.'},
],

aph: [
  {d:'F', q:'Em adultos, a frequência correta de compressões na RCP é:', opts:['60-80/min','80-100/min','100-120/min','120-140/min','Acima de 140/min'], ans:2, exp:'AHA 2020: 100-120 compressões/minuto, profundidade mínima de 5 cm (máx. 6 cm).'},
  {d:'F', q:'A sigla APH significa:', opts:['Atendimento Pré-Hospitalar','Auxílio Pós-Hospitalar','Atendimento Primário Humano','Ação Preventiva Hospitalar','Assistência Paramédica Hospitalar'], ans:0, exp:'APH = Atendimento Pré-Hospitalar: todo atendimento prestado à vítima antes da chegada ao hospital.'},
  {d:'F', q:'O pulso de adulto deve ser checado na artéria:', opts:['Radial','Femoral','Carotídea','Braquial','Tibial'], ans:2, exp:'Em emergências, o pulso de adulto é verificado na artéria carótida (pescoço) por ser de fácil acesso e confiável.'},
  {d:'F', q:'O sinal universal de engasgo (obstrução de vias aéreas) é:', opts:['Tosse forte','Mãos na garganta','Palidez facial','Cianose labial','Inconsciência'], ans:1, exp:'O sinal universal de engasgo é as duas mãos na garganta, indicando obstrução de vias aéreas.'},
  {d:'F', q:'Em que posição deve ficar uma vítima inconsciente que respira e NÃO tem trauma?', opts:['Decúbito dorsal (de costas)','Posição fetal','Posição lateral de segurança (PLS)','Sentada','De bruços'], ans:2, exp:'Posição Lateral de Segurança (PLS): evita aspiração de vômito e mantém vias aéreas pérvias em vítimas inconscientes sem trauma.'},
  {d:'F', q:'A relação compressão:ventilação na RCP adulto com 1 socorrista é:', opts:['15:2','30:2','30:1','15:1','20:2'], ans:1, exp:'Para adultos (1 ou 2 socorristas): 30 compressões para 2 ventilações, sem interrupções.'},
  {d:'M', q:'Na Cadeia de Sobrevivência (AHA 2020) para PCR fora do hospital, a ordem correta é:', opts:['Desfibrilação – RCP – Acionar – Cuidados pós','Reconhecer/Acionar – RCP alta qualidade – Desfibrilação – Suporte avançado – Cuidados pós','Acionar – Desfibrilação – RCP – Cuidados pós','RCP – Reconhecer – Acionar – Suporte avançado','Suporte avançado – RCP – Desfibrilação – Cuidados pós'], ans:1, exp:'Cadeia de Sobrevivência AHA 2020 (extrahospitalar): 1-Reconhecer e acionar; 2-RCP; 3-DEA; 4-Suporte avançado; 5-Cuidados pós-PCR.'},
  {d:'M', q:'O método de abertura de vias aéreas contraindicado em suspeita de trauma cervical é:', opts:['Tração mandibular (jaw-thrust)','Hiperextensão da cabeça com elevação do mento','Cânula orofaríngea','Aspiração manual','Colar cervical'], ans:1, exp:'A hiperextensão (head-tilt/chin-lift) movimenta a coluna cervical — contraindicada em trauma. Usar jaw-thrust.'},
  {d:'M', q:'A cor AMARELA na triagem START indica:', opts:['Imediato — risco de vida','Retardado — grave mas estável','Leve — pode aguardar','Óbito ou sem chance','Observação'], ans:1, exp:'START Triage: Vermelho = imediato, Amarelo = retardado (grave/estável), Verde = menor, Preto = óbito.'},
  {d:'M', q:'A manobra de Heimlich em adulto consciente com engasgo completo aplica compressões:', opts:['No tórax, abaixo do esterno','No abdome, acima do umbigo e abaixo do esterno','No abdome, abaixo do umbigo','Na coluna lombar','No pescoço'], ans:1, exp:'Heimlich: compressões abdominais no epigástrio (acima do umbigo e abaixo do processo xifoide), para cima e para dentro.'},
  {d:'M', q:'A profundidade mínima de compressão torácica em adultos na RCP é:', opts:['3 cm','4 cm','5 cm','6 cm','7 cm'], ans:2, exp:'AHA 2020: compressões de pelo menos 5 cm, não excedendo 6 cm, em adultos.'},
  {d:'M', q:'Em trauma de tórax com suspeita de pneumotórax hipertensivo, o socorrista deve:', opts:['Realizar RCP imediatamente','Impor bandagem oclusiva em todos os lados','Aplicar bandagem oclusiva em 3 lados (válvula unidirecional)','Ignorar e tratar outras lesões','Dar ventilação com pressão positiva'], ans:2, exp:'Pneumotórax aberto: bandagem oclusiva em 3 lados cria válvula unidirecional, permitindo saída de ar mas não entrada.'},
  {d:'M', q:'O DEA (Desfibrilador Externo Automático) pode ser utilizado por:', opts:['Apenas médicos','Apenas paramédicos','Apenas bombeiros treinados','Qualquer pessoa leiga, pois guia o usuário por voz','Apenas enfermeiros'], ans:3, exp:'O DEA é projetado para uso por leigos — orienta o operador por comandos de voz e analisa automaticamente o ritmo.'},
  {d:'M', q:'A imobilização de vítima com suspeita de trauma raquimedular requer:', opts:['Apenas colar cervical','Colar cervical + prancha rígida + fixadores','Somente maca flexível','Maca articulada + colar','Apenas amarrar a vítima à maca'], ans:1, exp:'Imobilização completa de coluna: colar cervical + prancha longa rígida + fixadores laterais de cabeça + tirantes.'},
  {d:'D', q:'No START Triage, a avaliação da perfusão capilar é feita no _____ com tempo de enchimento esperado:', opts:['Lóbulo da orelha – < 1s','Leito ungueal – < 2s','Palma da mão – < 3s','Lábios – < 2s','Pé – < 3s'], ans:1, exp:'START avalia perfusão pelo leito ungueal (enchimento capilar): normal < 2s. Se > 2s = vermelho.'},
  {d:'D', q:'Em queimadura de 2º grau profunda, o tratamento pré-hospitalar correto é:', opts:['Estourar as bolhas e cobrir','Aplicar creme hidratante','Cobrir com curativo úmido e não estourar bolhas','Imergir em água fria por 30 min','Não cobrir para não infectar'], ans:2, exp:'Queimadura: não estourar bolhas (barreira protetora), cobrir com curativo úmido e não aderente, não usar cremes domésticos.'},
  {d:'D', q:'A regra dos "9" para queimaduras em adulto atribui ao tronco anterior:', opts:['9%','18%','27%','36%','4,5%'], ans:1, exp:'Regra dos 9 (Wallace): cabeça=9%, cada braço=9%, tronco anterior=18%, tronco posterior=18%, cada perna=18%, genitália=1%.'},
  {d:'D', q:'Em PCR por afogamento em criança, a sequência prioritária difere do adulto porque:', opts:['Inicia-se com desfibrilação','Prioriza-se 5 ventilações de resgate antes das compressões','Não se faz ventilação','Usa-se relação 15:2 iniciando pelas ventilações','Não se usa DEA'], ans:3, exp:'Em crianças (afogamento/asfixia), a parada geralmente é respiratória: dar 5 ventilações iniciais e usar relação 15:2 (2 socorristas).'},
  {d:'D', q:'O choque hipovolêmico hemorrágico classe III implica perda de:', opts:['Até 15% da volemia','15-30% da volemia','30-40% da volemia','Acima de 40% da volemia','Qualquer valor com sinais vitais normais'], ans:2, exp:'Classificação de choque hemorrágico (ATLS): Classe I ≤15%, Classe II 15-30%, Classe III 30-40%, Classe IV >40%.'},
  {d:'D', q:'O torniquete (garrote) deve ser aplicado para controle de hemorragia em membros:', opts:['Diretamente sobre a ferida','5-7 cm proximal à ferida (acima do sangramento)','5-7 cm distal à ferida','Em qualquer ponto do membro','Apenas se pressão direta falhar após 30 min'], ans:1, exp:'Torniquete: 5-7 cm acima (proximal) da lesão; apertar até cessar o sangramento; anotar horário; não remover no pré-hospitalar.'},
],

st: [
  {d:'F', q:'Em colapso de estrutura, a primeira ação da equipe é:', opts:['Usar câmera térmica','Remoção de entulho','Chamada de voz com silêncio total','Acionamento de cão farejador','Avaliação estrutural por engenheiro'], ans:2, exp:'Primeiro: silêncio total + chamada de voz para detectar sinais sonoros de vítimas vivas antes de qualquer equipamento.'},
  {d:'F', q:'O KED (Kendrick Extrication Device) é utilizado para:', opts:['Imobilizar fraturas de MMII','Extrair vítima sentada com suspeita de coluna','Realizar RCP em espaço confinado','Controlar hemorragia','Ventilação artificial'], ans:1, exp:'KED: colete de imobilização de coluna para extração de vítimas sentadas em veículos.'},
  {d:'F', q:'Em espaço confinado, a concentração de O₂ considerada segura para entrada é:', opts:['Acima de 16%','Entre 19,5% e 23%','Acima de 23%','Entre 18% e 21%','Qualquer concentração com EPIs adequados'], ans:1, exp:'Atmosfera segura: O₂ entre 19,5% e 23%. Abaixo de 19,5% = deficiente; acima de 23% = enriquecida (risco de incêndio).'},
  {d:'F', q:'O que é "zona de exclusão" em operações de busca e salvamento?', opts:['Área para descanso da equipe','Área de perigo imediato ao redor da vítima/estrutura','Área de triagem de vítimas','Área de comando','Área de acesso de ambulâncias'], ans:1, exp:'Zona de exclusão (quente): área de perigo imediato, acesso apenas de equipes necessárias para o resgate.'},
  {d:'F', q:'O método de busca em "grade" (grid) é utilizado em áreas:', opts:['Pequenas e com obstáculos','Grandes e abertas, sem obstáculos significativos','Subaquáticas','Urbanas densas','Com vítimas múltiplas confirmadas'], ans:1, exp:'Busca em grade: eficiente para grandes áreas abertas. Divide a área em setores e percorre sistematicamente.'},
  {d:'F', q:'Qual EPI é obrigatório para entrada em espaço confinado com atmosfera desconhecida?', opts:['Apenas máscara N95','Capacete e luvas','SCBA (Self-Contained Breathing Apparatus) + traje adequado','Apenas respirador semifacial PFF2','Cinto de segurança simples'], ans:2, exp:'Espaço confinado com atmosfera desconhecida ou deficiente: SCBA (AR autônomo) é obrigatório, não apenas máscaras filtrantes.'},
  {d:'M', q:'O escoramento em "T" é utilizado para:', opts:['Conter encostas','Suportar paredes verticais em risco de colapso','Criar acessos em pisos','Fixar coberturas','Estabilizar veículos'], ans:1, exp:'Escoramento em "T" (rakers/escoras inclinadas): estabiliza paredes verticais ameaçadas de desmoronamento lateral.'},
  {d:'M', q:'A concentração de CO (monóxido de carbono) imediatamente perigosa à vida em espaço confinado é:', opts:['35 ppm','200 ppm','1.200 ppm','1.200 mg/m³','50 ppm'], ans:2, exp:'IDLH (NIOSH) para CO: 1.200 ppm — concentração que representa perigo imediato à vida.'},
  {d:'M', q:'Na busca por vítimas soterradas, o detector de vítimas por vibração (geofone/sismógrafo) é mais eficaz quando:', opts:['A vítima faz barulho constantemente','Há silêncio total e a vítima é solicitada a bater em algo','Em ambientes barulhentos','Com equipes trabalhando ao redor','Com máquinas pesadas em operação'], ans:1, exp:'Geofone: detecta micro-vibrações; requer silêncio absoluto e a vítima deve bater (tocar, gritar) para gerar sinal.'},
  {d:'M', q:'O sistema ICS (Incident Command System) em operações de resgate define que cada supervisor gerencia no máximo:', opts:['3 subordinados','5-7 subordinados (ideal 5)','10 subordinados','Sem limite','2 subordinados'], ans:1, exp:'ICS: amplitude de controle ideal de 3 a 7 pessoas por supervisor (padrão 5), para manter controle efetivo.'},
  {d:'M', q:'Em resgate em trincheira, a zona de exclusão mínima lateral a partir das bordas é de:', opts:['0,5 m','1 m','1,5 m','3 m','5 m'], ans:1, exp:'Trincheira: zona de exclusão de pelo menos 1 metro além das bordas para evitar vibração e colapso secundário.'},
  {d:'M', q:'O índice HAZMAT no contexto de espaço confinado que mais mata é:', opts:['Excesso de oxigênio','Deficiência de oxigênio','Monóxido de carbono','H₂S','Explosão'], ans:1, exp:'A deficiência de O₂ (< 19,5%) é a principal causa de morte em espaço confinado mundialmente.'},
  {d:'M', q:'A ferramenta pneumática de percussão em espaço confinado é contraindicada quando há:', opts:['Baixa temperatura','Excesso de O₂ ou atmosfera inflamável','Pouca iluminação','Muita umidade','Presença de vítima consciente'], ans:1, exp:'Ferramentas pneumáticas/elétricas criam centelhas — contraindicadas em atmosfera com O₂ acima de 23% ou gases inflamáveis.'},
  {d:'M', q:'O acesso por "túnel" (criação de passagem horizontal no entulho) é preferido quando:', opts:['A vítima está em andares superiores','A vítima está soterrada horizontalmente e o acesso vertical é impossível','Há risco de incêndio','A vítima é obesa','O entulho é de concreto armado'], ans:1, exp:'Túnel horizontal: quando o acesso vertical é impossível ou perigoso e a vítima está em posição horizontal soterrada.'},
  {d:'D', q:'O NR-33 classifica espaço confinado quanto ao risco em:', opts:['Baixo e alto','Tipo A, B e C','Permitidos e não permitidos para entrada','Classes I, II e III','Zonas 0, 1 e 2'], ans:2, exp:'NR-33: espaços "permitidos" (sem risco significativo) e "não permitidos" (com risco potencial grave — exigem PTE).'},
  {d:'D', q:'A técnica de "breaching" (abertura de parede) em busca de vítimas começa por:', opts:['O ponto mais alto da parede','A base da parede','Um ponto de menor resistência identificado por percussão','O centro geométrico da parede','A lateral mais afastada do colapso'], ans:2, exp:'Breaching: identificar por batidas (percussão) o ponto de menor resistência (som oco) antes de iniciar a abertura.'},
  {d:'D', q:'O "void" (câmara de sobrevivência) mais comum em colapso de laje é formado:', opts:['Ao lado de paredes externas','Em formato triangular ao lado de móveis resistentes ou vigas','No centro do ambiente','Nos cantos superiores dos cômodos','Apenas em estruturas de madeira'], ans:1, exp:'Voids triangulares formam-se ao lado de móveis rígidos (sofás, mesas) ou vigas que sustentam a laje colapsada.'},
  {d:'D', q:'Em resgate em montanha (busca em terreno), o padrão de busca "pente" (sweep) é ideal quando:', opts:['A área é circular','O terreno é irregular com muitos obstáculos','A área é linear (corredor, vale) com acesso por uma extremidade','Há muitas equipes disponíveis','O clima é adverso'], ans:2, exp:'Busca em pente: eficaz em terrenos lineares (trilhas, vales) com acesso ordenado por uma extremidade.'},
  {d:'D', q:'Na extração de vítima de espaço confinado vertical (poço), o dispositivo de resgate preferencial é:', opts:['Corda simples sem trava','Sistema trípode com talha e linha de segurança','Escada de madeira','Guincho de veículo','Corda de segurança amarrada ao caminhão'], ans:1, exp:'Extração vertical em poço: trípode sobre a abertura + talha (sistema de elevação mecânico) + linha de segurança independente.'},
  {d:'D', q:'A "apneia de busca" no contexto de espaço confinado ocorre quando:', opts:['A equipe perde o contato de rádio','Um resgatista entra sem linha guia e perde a saída','A vítima perde a consciência durante o resgate','A ventilação forçada falha','O gás suprime o detector'], ans:1, exp:'"Apneia de busca" (situação crítica): resgatista que entra em espaço sem linha guia pode desorientar-se e não encontrar a saída, especialmente com visibilidade zero.'},
],

op: [
  {d:'F', q:'O painel de segurança ONU é obrigatório em veículos que transportam produtos perigosos. O número ONU 1203 identifica:', opts:['Diesel','Etanol','Gasolina','GLP','Querosene'], ans:2, exp:'ONU 1203 = Gasolina (líquido inflamável, classe 3).'},
  {d:'F', q:'No sistema NFPA 704, o losango AZUL representa:', opts:['Inflamabilidade','Reatividade','Saúde','Perigo especial','Radioatividade'], ans:2, exp:'NFPA 704: Azul = Saúde, Vermelho = Inflamabilidade, Amarelo = Reatividade, Branco = Especial.'},
  {d:'F', q:'A "zona quente" em incidente com produto perigoso é a área:', opts:['De suporte e comando','De descontaminação','De contato direto com o produto','De triagem de vítimas','De acesso de ambulâncias'], ans:2, exp:'Zona quente (exclusão): área diretamente contaminada; acesso restrito a equipe com EPI máximo.'},
  {d:'F', q:'O número de risco "33" no painel de transporte indica:', opts:['Gás inflamável','Líquido muito inflamável (ponto de fulgor < 23°C)','Sólido inflamável','Oxidante','Corrosivo'], ans:1, exp:'Número de risco 33 = líquido muito inflamável. Ex: gasolina (1203), etanol (1170).'},
  {d:'F', q:'O GLP (Gás de Cozinha) tem número ONU:', opts:['1075','1017','1203','1993','1824'], ans:0, exp:'ONU 1075 = GLP (Gases de Petróleo Liquefeitos). Gás inflamável, classe 2.1.'},
  {d:'F', q:'A primeira ação ao chegar a um incidente com produto perigoso é:', opts:['Entrar para resgatar vítimas','Identificar o produto a distância segura (binóculos/painel ONU)','Aplicar espuma no produto','Descontaminar as vítimas','Ligar para o fabricante'], ans:1, exp:'Primeiro: identificar o produto À DISTÂNCIA usando o painel ONU/número de risco, rótulo ou documentação — nunca se aproximar sem saber o produto.'},
  {d:'M', q:'O EPI Nível A oferece proteção contra:', opts:['Apenas respingos','Apenas vapores','Vapores, gases, partículas e líquidos (proteção máxima)','Apenas agentes biológicos','Apenas radiação'], ans:2, exp:'Nível A: encapsulamento total com SCBA interno — máxima proteção contra vapores, gases e líquidos.'},
  {d:'M', q:'O ONU 1017 identifica qual produto de alto risco em emergências:', opts:['Amônia','Ácido Sulfúrico','Cloro','Formol','Bromo'], ans:2, exp:'ONU 1017 = Cloro (Cl₂). Gás tóxico e oxidante, muito perigoso em vazamentos.'},
  {d:'M', q:'A descontaminação de emergência (gross decontamination) consiste em:', opts:['Remoção do agente com solventes','Lavagem abundante com água e remoção de roupas contaminadas','Aplicação de antídotos','Uso de carvão ativado','Ventilação forçada da área'], ans:1, exp:'Descontaminação bruta: retirar roupas (elimina até 80% da contaminação) e lavar com água abundante antes de qualquer tratamento.'},
  {d:'M', q:'O número de risco "X" anteposto ao número de risco ONU (ex: X338) indica:', opts:['Produto radioativo','Reação violenta com água','Produto oxidante','Produto corrosivo','Produto explosivo'], ans:1, exp:'X antes do número de risco = reação perigosa com água. Ex: X338 = líquido inflamável que reage violentamente com água.'},
  {d:'M', q:'O guia de referência para emergências com produtos perigosos no Brasil é:', opts:['Manual de Primeiros Socorros da OMS','FISPQ (Ficha de Segurança)','ERG (Emergency Response Guidebook) / Guia de Resposta a Emergências','Norma ABNT NBR 7500','Manual NFPA 471'], ans:2, exp:'O ERG (GRE – Guia de Resposta a Emergências), publicado pelo DOT/Transport Canada/SCT, é o guia de referência em campo.'},
  {d:'M', q:'A distância de isolamento inicial para a maioria dos produtos perigosos em vazamento pequeno deve ser de pelo menos:', opts:['10 m','25 m','50 m','100 m','500 m'], ans:1, exp:'ERG: distância inicial de isolamento geralmente 25-30 m para vítimas e curiosos em vazamentos pequenos (varia conforme o produto).'},
  {d:'M', q:'Produto com rótulo de risco romboidal LARANJA com número 1 é da classe:', opts:['Explosivos','Gases inflamáveis','Líquidos inflamáveis','Oxidantes','Tóxicos'], ans:0, exp:'Rótulo laranja = Classe 1 = Explosivos (subclasses 1.1 a 1.6 conforme tipo de risco).'},
  {d:'M', q:'Em incêndio envolvendo GLP, a prioridade é:', opts:['Combater o incêndio diretamente','Refrigerar o cilindro/tanque com água e fechar a válvula SE seguro','Cobrir o cilindro com espuma','Evacuar apenas se o cilindro estiver vermelho','Usar CO₂ no cilindro'], ans:1, exp:'GLP em chamas: resfriar o recipiente com água (evitar BLEVE), fechar válvula se seguro, isolar a área.'},
  {d:'D', q:'O fenômeno BLEVE (Boiling Liquid Expanding Vapor Explosion) ocorre quando:', opts:['Líquido inflamável vaza e encontra ignição','Um recipiente pressurizado aquecido perde a integridade e o líquido vira vapor explosivamente','Dois produtos incompatíveis são misturados','Gás comprimido foge por rachadura','Produto pulverizado encontra faísca'], ans:1, exp:'BLEVE: explosão de recipiente pressurizado aquecido — o líquido superaquecido se expande instantaneamente em vapor, causando explosão violenta.'},
  {d:'D', q:'O índice LEL (Lower Explosive Limit) indica:', opts:['Temperatura de autoignição','Ponto de fulgor','Concentração mínima no ar para que o gás exploda','Concentração máxima para explosão','Tempo de evacuação segura'], ans:2, exp:'LEL (Limite Inferior de Explosividade): concentração mínima do gás/vapor no ar abaixo da qual a mistura não explode. Acima do UEL também não explode (muito rico).'},
  {d:'D', q:'A EPI nível B difere do nível A principalmente porque:', opts:['Tem SCBA externo, com menor proteção de pele','Não exige SCBA','Protege apenas contra vapores, não líquidos','É usado apenas em situações biológicas','Inclui proteção contra radiação'], ans:0, exp:'Nível B: SCBA externo (proteção respiratória máxima), mas vestimenta não encapsulada totalmente — menor proteção de pele que o Nível A.'},
  {d:'D', q:'Qual produto, ao entrar em contato com água, gera gás H₂S (ácido sulfídrico)?', opts:['Cloreto de sódio','Sulfeto de sódio','Ácido acético','Carbonato de cálcio','Permanganato de potássio'], ans:1, exp:'Sulfeto de sódio (Na₂S) + água → NaOH + H₂S. O H₂S é extremamente tóxico (IDLH: 50 ppm).'},
  {d:'D', q:'O sistema de classificação GHS (Sistema Globalmente Harmonizado) substituiu no Brasil qual instrumento?', opts:['ABNT NBR 7500','FISPQ baseada na ANSI Z400.1','Norma regulamentadora NR-26 e as FISPQs antigas (NBR 14725)','Decreto 96.044','Portaria INMETRO 53/2008'], ans:2, exp:'O GHS foi incorporado ao Brasil pela ABNT NBR 14725 (revisada) e pela NR-26, padronizando a FISPQ e a rotulagem química.'},
  {d:'D', q:'Em derramamento de ácido sulfúrico concentrado, o produto de neutralização imediata mais seguro para uso emergencial em solo é:', opts:['Água pura abundante','Cal hidratada (hidróxido de cálcio) ou bicarbonato de sódio','Soda cáustica','Areia fina','Cloreto de cálcio'], ans:1, exp:'Cal hidratada ou bicarbonato de sódio: neutralizam o ácido sem reação violenta. Soda cáustica é perigosa; água pura dilui mas pode dispersar o ácido.'},
],

aq: [
  {d:'F', q:'A diferença entre afogamento ATIVO e PASSIVO (apostila cap. 17) é:', opts:['Ativo = em água doce; Passivo = em água salgada','Ativo = vítima em pânico, agita-se e pode gritar; Passivo = vítima se submerge silenciosamente — vertical com cabeça afundando — mais difícil de identificar','Ativo = sem aspiração de água; Passivo = com aspiração','Ativo = adulto; Passivo = criança menor de 5 anos','Ativo = intencional; Passivo = acidental'], ans:1, exp:'Apostila CBMPA, cap. 17 (p. 571): Afogamento Ativo (pânico) — vítima visível, agitando braços na superfície. Afogamento Passivo — mais perigoso por ser silencioso: a vítima se submerge verticalmente sem dar sinais evidentes. É o principal causador de afogamentos não detectados a tempo pelo guarda-vidas.'},
  {d:'F', q:'Vítima de afogamento que está na água, consciente, com tosse e sem espuma corresponde ao grau:', opts:['Grau 1','Grau 2','Grau 3','Grau 4','Grau 5'], ans:0, exp:'Szpilman Grau 1: consciente, com tosse, sem espuma. Mortalidade < 1%.'},
  {d:'F', q:'A "maré de sizígia" (apostila cap. 17, sec. 4.1) ocorre quando:', opts:['A Lua está em quarto crescente ou minguante','Sol, Terra e Lua estão alinhados (Lua Nova ou Lua Cheia) — marés de maior amplitude','A Lua está no ponto mais distante da Terra','O vento é mais forte que o normal','As correntes de retorno se formam com mais frequência'], ans:1, exp:'Apostila CBMPA, cap. 17 (p. 551): Maré de Sizígia — ocorre na Lua Nova e Lua Cheia, quando Sol, Terra e Lua estão alinhados. A força gravitacional combinada gera marés de maior amplitude (maior diferença entre alta e baixa-mar). É quando as correntes são mais intensas e os riscos de afogamento aumentam.'},
  {d:'F', q:'Afogamento "seco" significa:', opts:['Afogamento em água salgada','Afogamento sem aspiração de água (laringoespasmo fecha a glote)','Afogamento em piscina sem cloro','Afogamento em água gelada','Afogamento em criança menor de 5 anos'], ans:1, exp:'Afogamento seco (10-15% dos casos): laringoespasmo reflexo fecha a glote — o paciente morre por asfixia sem aspirar água.'},
  {d:'F', q:'O sinal mais evidente de afogamento passivo (vítima que afunda silenciosamente) é:', opts:['Gritos por socorro','Agitação na água','Vítima vertical, cabeça inclinada, face abaixo d\'água','Braços acenando','Espuma na boca'], ans:2, exp:'Afogamento ativo (pânico) = agitação/gritos. Afogamento passivo = vítima vertical silenciosa, cabeça afundando — perigosamente discreto.'},
  {d:'F', q:'A corrente de retorno (rip current) é:', opts:['Corrente de maré','Canal estreito de água que escoa rapidamente para o mar, quebrando as ondas','Corrente de fundo em rios','Vórtice formado em cachoeiras','Corrente gerada por ventos'], ans:1, exp:'Rip current: fluxo estreito e rápido que escoa perpendicularmente à praia — principal causador de afogamentos em praias.'},
  {d:'M', q:'Grau 5 de Szpilman apresenta:', opts:['Tosse com espuma rósea','Inconsciente com pulso, sem apneia','Parada respiratória com pulso presente','PCR (sem pulso e sem respiração)','Consciente com edema pulmonar'], ans:2, exp:'Szpilman Grau 5: inconsciente, parada respiratória (apneia), MAS com pulso presente. Mortalidade ≈ 44%.'},
  {d:'M', q:'A abordagem pela retaguarda em vítima de afogamento em pânico é feita para:', opts:['Facilitar o transporte','Evitar o abraço de pânico da vítima','Verificar a coluna cervical','Fazer RCP na água','Aplicar o suporte de coluna'], ans:1, exp:'Pela retaguarda: evita que a vítima em pânico empurre o socorrista para baixo ("abraço de pânico").'},
  {d:'M', q:'A "Praia de Tombo" (apostila cap. 17, sec. 4.7.2) é caracterizada por:', opts:['Areia fina com inclinação suave e ondas pequenas — baixo risco','Inclinação acentuada sem barra de areia — ondas quebram diretamente na areia com forte retorno que arrasta banhistas','Banco de areia submerso que quebra as ondas antes de chegar à areia','Praia de rio com corrente lateral','Maré com oscilação de mais de 4 metros de amplitude'], ans:1, exp:'Apostila CBMPA, cap. 17 (p. 557): Praia de Tombo — inclinação acentuada, ausência de barra de areia. As ondas quebram diretamente sobre a areia com grande energia e o retorno (espraiamento reverso) é intenso, arrastando banhistas. Predominante no Pará — a maioria das praias fluviais com influência de maré do Estado são do tipo tombo.'},
  {d:'M', q:'A "Zona Primária" de responsabilidade do guarda-vidas (apostila cap. 17, sec. 7.5) corresponde a:', opts:['A área de areia seca em frente à guarita','A faixa entre a guarita e a beira da praia','A área entre a beira da praia e a zona de arrebentamento — onde se concentram os banhistas e ocorre a maioria dos afogamentos','A região além do arrebentamento — mar aberto','A área lateral de 50m em cada lado da guarita'], ans:2, exp:'Apostila CBMPA, cap. 17 (p. 577): Zona Primária = área compreendida entre a beira da praia (borda d\'água) e a zona de arrebentamento. É a região de maior concentração de banhistas e principal área de vigilância e atuação do guarda-vidas.'},
  {d:'M', q:'Em salvamento aquático, a embarcação deve se posicionar em relação à vítima:', opts:['A favor da corrente (água empurra para a vítima)','Contra a corrente (rio) ou do lado de onde vem o vento (mar)','Sem relação com corrente','A 45° da vítima','Entre a vítima e a margem'], ans:1, exp:'Posicionar a embarcação de forma que a correnteza ou vento a empurre naturalmente em direção à vítima, facilitando o resgate.'},
  {d:'M', q:'RCP em afogamento: deve-se iniciar com:', opts:['30 compressões','5 ventilações de resgate antes das compressões','Desfibrilação imediata','Aspiração da água dos pulmões','Posição de Trendelenburg'], ans:1, exp:'Afogamento: causa asfixia, não cardíaca. Iniciar com 5 ventilações de resgate para oxigenar imediatamente.'},
  {d:'M', q:'O "Salvamento Conjugado" (apostila cap. 17, sec. 6.5) consiste em:', opts:['Salvamento realizado por dois guarda-vidas nadando simultaneamente','Combinação de dois ou mais tipos de recurso de salvamento — ex: viatura + natação, embarcação + guarda-vidas a nado','Resgate de duas vítimas ao mesmo tempo por um único guarda-vidas','Salvamento que combina prevenção e resgate no mesmo atendimento','Uso de corda de arremesso + torpedo em sequência'], ans:1, exp:'Apostila CBMPA, cap. 17 (p. 570): Salvamento Conjugado — combina dois ou mais tipos de recursos (ex: viatura salva-vidas com natação, ou embarcação com guarda-vidas a nado). Amplia o alcance e a eficácia do resgate em situações de distância ou condições adversas.'},
  {d:'M', q:'As técnicas de "desencalhamento" (soltura) no salvamento aquático (apostila cap. 17, sec. 6.3) são usadas quando:', opts:['O torpedo se prende nas ondas e não alcança a vítima','A vítima em pânico agarra o guarda-vidas — colocando ambos em risco de afogamento','O guarda-vidas não consegue entrar na água por corrente forte','A vítima está inconsciente e sem pulso','A embarcação encalha em banco de areia'], ans:1, exp:'Apostila CBMPA, cap. 17 (p. 571-572): técnicas de desencalhamento são empregadas quando a vítima em pânico agarra o socorrista (pelo corpo, pescoço, nuca ou braço), colocando ambos em risco. Incluem solturas de agarrada ao corpo, ao pescoço, à nuca e pelo braço. O princípio é libertar-se do contato para retomar o controle do resgate.'},
  {d:'D', q:'O fundamento doutrinário da PREVENÇÃO no serviço de guarda-vidas (apostila cap. 17, sec. 7.4) é:', opts:['Garantir o maior número de guarda-vidas por km de praia','Posicionar a viatura no ponto de maior visibilidade','Que a prevenção reduz ao máximo a necessidade de ações de salvamento — o guarda atua ANTES do afogamento','Realizar simulados mensais com a população','Manter a Zona Primária sempre desocupada por banhistas'], ans:2, exp:'Apostila CBMPA, cap. 17 (p. 576): Fundamento da Prevenção — a prevenção é o principal instrumento do serviço, pois reduz ao máximo a necessidade de ações de salvamento. O guarda-vidas deve agir de forma antecipada: identificando riscos, orientando banhistas e eliminando situações perigosas antes que se tornem emergências.'},
  {d:'D', q:'A classificação de Szpilman é usada para:', opts:['Classificar a gravidade do afogamento e orientar o tratamento','Determinar o tipo de corrente de água','Classificar equipamentos de salvatagem','Padronizar técnicas de nado','Calcular distâncias de resgate'], ans:0, exp:'A Classificação de Szpilman (Graus 1-6) orienta o tratamento pré-hospitalar e hospitalar do afogado com base nos sinais clínicos.'},
  {d:'D', q:'Qual Grau de Szpilman já apresenta mortalidade superior a 90%?', opts:['Grau 3','Grau 4','Grau 5','Grau 6','Grau 2'], ans:3, exp:'Grau 6 (óbito no local, PCR prolongada sem RCP): mortalidade > 90-93%. Grau 5 ≈ 44%.'},
  {d:'D', q:'Em afogamento em águas rasas com suspeita de trauma cervical, como se procede no salvamento aquático?', opts:['Ignorar o trauma e priorizar a retirada','Retirar verticalmente pelo pescoço','Estabilizar a coluna em posição neutra na água antes de retirar','Retirar rapidamente e avaliar depois','Não mover a vítima de forma alguma'], ans:2, exp:'Mergulho em água rasa: suspeita alta de trauma cervical. Estabilizar a coluna em posição neutra na água, depois retirar em prancha com suporte cervical.'},
  {d:'D', q:'Segundo a apostila cap. 17 (p. 572), os principais fatores associados a afogamentos incluem TODOS, EXCETO:', opts:['Uso de álcool','Epilepsia','Traumatismos e acidentes de mergulho em água rasa','Ausência de protetor solar','Doenças cardíacas e pulmonares preexistentes'], ans:3, exp:'Apostila CBMPA, cap. 17 (p. 572): fatores relacionados a afogamentos: uso de álcool (mais comum), epilepsia, traumatismos, doenças cardíacas e/ou pulmonares e acidente de mergulho em água rasa. A ausência de protetor solar é um fator de saúde dermatológica, sem relação com o risco de afogamento.'},
  {d:'D', q:'O "Sentinela" no serviço de guarda-vidas (apostila cap. 17, sec. 7.2) é definido como:', opts:['Guarda-vidas responsável exclusivamente pela comunicação via rádio','Embarcação de vigilância ancorada a distância da praia','Posto de observação elevado instalado na areia','Guarda-vidas de reserva que substitui outros em casos de afastamento','Guarda-vidas que vigia e se desloca dentro de uma área de cobertura durante todo o serviço — sem ponto fixo'], ans:4, exp:'Apostila CBMPA, cap. 17 (p. 575-576): Sentinela — guarda-vidas que vigia e se desloca dentro de área de cobertura definida durante todo o serviço. Diferencia-se do posto fixo por manter mobilidade constante, patrulhando a zona de responsabilidade e interagindo com banhistas para prevenção ativa.'},
],

sa: [
  {d:'F', q:'O mosquetão de segurança (com trava) utilizado em trabalho em altura deve ser certificado pela norma:', opts:['ABNT NBR 14626','ABNT NBR 15835','EN 362 / ABNT NBR 15835','NR-35','NFPA 1983'], ans:2, exp:'Mosquetão de segurança com trava: EN 362 (europeia) ou ABNT NBR 15835. NR-35 é a norma de segurança do trabalho em altura.'},
  {d:'F', q:'A NR-35 considera trabalho em altura toda atividade realizada acima de:', opts:['1,0 m','1,5 m','2,0 m','2,5 m','3,0 m'], ans:2, exp:'NR-35: trabalho em altura é qualquer atividade acima de 2,0 m do nível inferior, com risco de queda.'},
  {d:'F', q:'O nó de "oito duplo" (figura oito em alça) é usado principalmente para:', opts:['Unir duas cordas','Criar ponto de ancoragem em alça','Travar o sistema de rapel','Fixar mosquetão à cadeirinha','Elevar carga pesada'], ans:1, exp:'Nó oito em alça (figure-8 on a bight): cria alça resistente usada para ancoragem ou fixação em mosquetão.'},
  {d:'F', q:'A cadeirinha (baudrier) de resgate deve ser inspecionada antes de cada uso buscando:', opts:['Apenas desgaste nas alças','Cortes, abrasões, deformações, costuras soltas e prazo de validade','Somente o peso máximo suportado','Apenas a cor das fitas','Presença de sujeira'], ans:1, exp:'Inspeção pré-uso: buscar cortes, abrasões, calor excessivo, costuras rompidas, deformações e verificar prazo de validade (geralmente 10 anos ou conforme fabricante).'},
  {d:'F', q:'O descensor "rack" (grade de rapel) é indicado para:', opts:['Escalada livre','Descida controlada com cargas pesadas e longas distâncias','Elevação de vítimas','Resgate em espaço confinado','Nó automático'], ans:1, exp:'Rack (grade): descensor para rappel de longa distância com cargas pesadas — fácil controle de velocidade.'},
  {d:'F', q:'O sistema de ancoragem deve sempre ser construído preferencialmente com:', opts:['1 ponto de ancoragem','2 pontos independentes ou mais','3 pontos dependentes','Qualquer ponto disponível','O mais próximo possível da vítima'], ans:1, exp:'Ancoragem: sempre 2 ou mais pontos independentes (redundância) para garantir a integridade do sistema em caso de falha de um ponto.'},
  {d:'M', q:'O sistema 3:1 (vantagem mecânica simples) num polipasto significa que:', opts:['3 pessoas puxam 1 corda','A força de tração é multiplicada por 3','A velocidade de elevação é multiplicada por 3','3 cordas sustentam 1 vítima','3 mosquetões são necessários'], ans:1, exp:'Polipasto 3:1: aplica-se 1/3 da força necessária para elevar a carga, mas percorre-se 3x mais corda. Vantagem mecânica = 3.'},
  {d:'M', q:'O nó "prussik" é um exemplo de nó:', opts:['De fixação terminal','De emenda entre cordas','Autoblocante (trava sob carga, solta sem carga)','Decorativo','De ancoragem múltipla'], ans:2, exp:'Prussik: nó autoblocante — trava quando carregado, pode ser deslizado manualmente quando sem carga. Usado como segurança em sistemas de rapel/ascensão.'},
  {d:'M', q:'Em operação de resgate em altura com vítima inconsciente, qual é o ponto de fixação primário da cadeirinha de resgate?', opts:['Pernas','Peitoral (sternal)','Dorso','Lateral da cadeirinha','Qualquer ponto disponível'], ans:1, exp:'Para vítima inconsciente: fixação no ponto esternal (frontal peitoral) para manter a vítima em posição semivertical/inclinada segura durante o resgate.'},
  {d:'M', q:'A corda de poliamida (nylon) para resgate difere da corda de poliéster porque:', opts:['É mais pesada','Tem maior elongação (absorve impacto) mas menor resistência à abrasão','Não absorve água','É mais rígida','Tem menor elongação e maior resistência UV'], ans:1, exp:'Poliamida: elongação dinâmica maior (absorve impactos de quedas) — ideal para escalada. Poliéster: menor elongação, melhor estabilidade de carga — melhor para sistemas de resgate estáticos.'},
  {d:'M', q:'O fator de queda 2 (pior cenário) ocorre quando:', opts:['A corda absorve toda a energia','O resgatista cai abaixo do ponto de ancoragem uma distância igual ao dobro do comprimento de corda disponível','A queda é de 2 metros','O nó de oito está mal feito','O resgatista está acima da ancoragem sem corda entre eles'], ans:4, exp:'Fator de queda = distância de queda / comprimento de corda. Fator 2 = pior caso: resgatista acima da ancoragem sem corda de folga cai o dobro da distância.'},
  {d:'M', q:'O dispositivo "stop" ou "ID" (Petzl) é um descensor:', opts:['De uso manual apenas','Semi-automático que trava quando se solta a alavanca','Mecânico sem travamento automático','Usado apenas em cordas de 12 mm','Proibido em resgate'], ans:1, exp:'Stop/ID: descensor semi-automático com trava de posição morta — para a descida ao soltar a alavanca.'},
  {d:'M', q:'Em resgate de vítima em edificação, a linha de vida horizontal deve ter deflexão máxima de:', opts:['5°','10°','15°','30°','45°'], ans:2, exp:'Linha de vida horizontal: deflexão máxima de 15° para limitar as forças nos pontos de ancoragem terminais.'},
  {d:'M', q:'O cinto tipo paraquedista (arnês full body) é obrigatório em trabalhos em altura quando:', opts:['A altura supera 3 m','Sempre que houver risco de queda','Apenas em telhados','Apenas para bombeiros','Quando o vento superar 40 km/h'], ans:1, exp:'NR-35: o arnês deve ser usado sempre que houver risco de queda, independentemente da altura.'},
  {d:'D', q:'Num sistema de ancoragem em "V" com ângulo de 60° entre os ramos, a força em cada ramo é:', opts:['Igual ao peso','57% do peso','100% do peso','Maior que o peso','50% do peso'], ans:1, exp:'Com ângulo de 60° no V, cada ramo suporta ~57% da carga. A 120° cada ramo já suporta 100%. Ideal manter < 60°.'},
  {d:'D', q:'Em resgate de vítima em estrutura com risco de colapso, a ancoragem deve ser:', opts:['Na própria estrutura comprometida','Externa e independente da estrutura comprometida','Improvisada com o que houver','Sem ancoragem fixa para agilizar','No veículo de resgate próximo'], ans:1, exp:'Ancoragem sempre independente da estrutura comprometida — edificações vizinhas, viaturas, postes ou sistemas portáteis.'},
  {d:'D', q:'O teste de carga estática em sistema de ancoragem para resgate humano requer resistência mínima de:', opts:['500 kgf','1000 kgf (≈10 kN)','2000 kgf','300 kgf','Qualquer carga que o resgatista suporte'], ans:1, exp:'Sistemas de resgate pessoal: resistência mínima de 1000 kgf (10 kN) nos pontos de ancoragem, conforme normas EN e NFPA 1983.'},
  {d:'D', q:'A técnica de "pick-off" em salvamento em altura consiste em:', opts:['Elevar uma vítima soterrada','Resgatar vítima presa em local inacessível, com o resgatista descendo até ela pelo sistema de cordas','Descer carga pesada por polipasto','Ancoragem em ponto único','Nó para fixação de vítima inconsciente'], ans:1, exp:'Pick-off: resgate de vítima presa (arranha-céu, antena, penhasco) com o resgatista descendo até ela e ambos subindo/descendo juntos.'},
  {d:'D', q:'A força máxima transmitida ao corpo em queda com absorvedor de energia deve ser inferior a:', opts:['2 kN','4 kN','6 kN','8 kN','10 kN'], ans:2, exp:'EN 355 / ABNT NBR 15834: absorvedor deve limitar a força de choque no corpo a no máximo 6 kN.'},
  {d:'D', q:'O klemheist (prussik duplo) se diferencia do prussik simples porque:', opts:['É mais rápido','Funciona apenas em cordas finas','Permite travamento bidirecional e funciona bem com fita tubular','Usa menos corda','É mais fraco'], ans:2, exp:'Klemheist: trava bidirecionalmente, funciona com fita tubular — mais versátil que o prussik simples em algumas situações.'},
],

sv: [
  {d:'F', q:'Em acidente veicular com vítima encarcerada, a primeira ação do bombeiro é:', opts:['Cortar o poste A','Estabilizar o veículo','Remover o teto','Extrair a vítima imediatamente','Aplicar colar cervical'], ans:1, exp:'Primeiro: estabilizar o veículo (calços, correntes, escoras) para evitar movimentos durante o resgate.'},
  {d:'F', q:'O poste "A" de um veículo é o pilar localizado:', opts:['Entre as portas traseiras','Entre as portas dianteira e traseira','Na frente do para-brisa (suporte do para-brisa)','Na traseira do veículo','No teto, acima das portas'], ans:2, exp:'Poste A: pilar dianteiro que suporta o para-brisa. B: entre as portas. C: pilar traseiro.'},
  {d:'F', q:'No salvamento veicular, a zona destinada ao palco de ferramentas e ao posicionamento de bombeiros e socorristas é chamada de:', opts:['Zona quente','Zona fria','Zona morna','Zona de exclusão','Zona de segurança'], ans:2, exp:'Zona morna: palco de ferramentas, posicionamento das equipes e acolhimento das vítimas após remoção. Zona quente = veículos envolvidos. Zona fria = livre acesso para recursos externos.'},
  {d:'F', q:'O triângulo de sinalização deve ser posicionado a que distância mínima do veículo acidentado em rodovia?', opts:['30 m','50 m','100 m','200 m','300 m'], ans:2, exp:'Em rodovias: triângulo a 100 m antes do veículo. Em vias urbanas: 30-50 m.'},
  {d:'F', q:'Em veículo com airbag não disparado, o bombeiro deve evitar trabalhar na área de:', opts:['Pneus','Janelas traseiras','Frente do airbag (zona de projeção)','Teto','Portas traseiras'], ans:2, exp:'Airbag não disparado: não colocar ferramentas, corpo ou vítima na trajetória de inflação.'},
  {d:'F', q:'A desconexão da bateria deve ser feita na seguinte ordem:', opts:['Positivo primeiro, depois negativo','Negativo primeiro, depois positivo','Qualquer ordem','Somente o positivo','Somente o negativo se houver incêndio'], ans:1, exp:'Bateria: desconectar sempre o cabo NEGATIVO (massa) primeiro para evitar curto-circuito.'},
  {d:'M', q:'O "dash roll" (rolamento do painel) é realizado para:', opts:['Remover o teto','Afastar o painel da vítima presa pelas pernas','Cortar os postes B e C','Remover portas','Inclinar o banco'], ans:1, exp:'Dash roll: empurra o painel e colunas dianteiras para frente, liberando espaço para as pernas da vítima presas sob o painel.'},
  {d:'M', q:'A estabilização progressiva no salvamento veicular (apostila cap. 16) consiste em:', opts:['Usar apenas calços de madeira na roda traseira','Adicionar recursos complementares de fixação ao longo da operação para garantir imobilidade total do veículo','Estabilizar o veículo antes de qualquer acesso inicial','Realizar somente em veículos invertidos','Usar correntes em torno do veículo sem calços'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 523): a estabilização progressiva agrega recursos adicionais (escoras, correntes, cunhas) durante a operação, garantindo imobilidade completa enquanto o resgate avança.'},
  {d:'M', q:'A técnica de "third door" (terceira porta) consiste em:', opts:['Abrir a porta traseira','Criar abertura ampla cortando o poste B e removendo as duas portas de um lado','Cortar o teto lateralmente','Remover o para-brisa','Cortar o poste A'], ans:1, exp:'Third door: cortar o poste B e rebater/remover as duas portas de um lado — cria abertura ampla para extração lateral.'},
  {d:'M', q:'Veículo capotado sobre o teto: após estabilização, a sequência preferencial é:', opts:['Cortar todos os postes imediatamente','Remover vidros → estabilizar → ampliar acesso cortando postes se necessário','Empurrar o veículo de volta','Extrair pela janela imediatamente','Cortar o assoalho'], ans:1, exp:'Veículo invertido: estabilizar, remover vidros, verificar a vítima, depois ampliar o acesso conforme necessário.'},
  {d:'M', q:'O kit de estabilização de veículo inclui:', opts:['Apenas calços de madeira','Calços, correntes de retenção, cunhas e escoras','Somente macacos hidráulicos','Apenas cordas','Extintor + cones'], ans:1, exp:'Estabilização: calços (step chocks), cunhas, correntes/cintas de retenção e escoras telescópicas.'},
  {d:'M', q:'Em incêndio pós-colisão com vítima encarcerada, a prioridade é:', opts:['Extração imediata sem estabilização','Extinção + extração simultânea com duas equipes','Esperar o fogo apagar','Acionar apenas o SAMU','Cobrir a vítima com cobertor'], ans:1, exp:'Incêndio + vítima encarcerada: dupla equipe — extinção do fogo simultaneamente à extração. Não esperar.'},
  {d:'M', q:'O espalhador hidráulico (spreader) é usado para:', opts:['Cortar postes de aço','Abrir espaços entre estruturas (portas, painel)','Remover vidros','Cortar cintos','Elevar o veículo'], ans:1, exp:'Espalhador: abre espaços entre superfícies metálicas — principalmente portas travadas, painéis amassados.'},
  {d:'M', q:'O "rebatimento de teto" no salvamento veicular (apostila cap. 16) é indicado para:', opts:['Proteger a vítima da chuva durante o resgate','Ampliar o acesso ao habitáculo quando as técnicas de porta são insuficientes, cortando as colunas e rebatendo o teto para frente ou para trás','Estabilizar o veículo capotado','Remover os cintos de segurança da vítima','Retirar apenas o para-brisa'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 532 – Abatimento/Rebatimento de Teto): técnica que consiste em cortar as colunas (A e/ou B) e rebater o teto para frente ou para trás, criando amplo espaço de acesso à vítima quando portas e janelas não são suficientes.'},
  {d:'D', q:'A técnica "Grande Porta" no salvamento veicular (apostila cap. 16) se diferencia da "Terceira Porta" porque:', opts:['Remove apenas a porta traseira do veículo','Envolve o corte das colunas B e C (e eventualmente A), criando abertura lateral maior','É utilizada somente em veículos com 2 portas','São técnicas equivalentes com nomes regionais diferentes','Não requer ferramentas hidráulicas'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 531 – Grande Porta): corte das colunas B e C próximo ao nível do assoalho, criando abertura lateral maior que a Terceira Porta (que corta apenas o poste B). Indicada quando é necessário maior espaço de extração.'},
  {d:'D', q:'A "Hora de Ouro do Salvamento Veicular" (apostila cap. 16) está relacionada a:', opts:['O tempo máximo de 1 hora para extração com ferramentas hidráulicas','O controle estrito do tempo desde a notificação do sinistro até o transporte da vítima ao hospital','O período de 60 minutos em que o veículo pode pegar fogo após a colisão','O prazo máximo para o primeiro socorrista chegar ao local','O tempo limite para desligar a bateria antes de cortar o veículo'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 527 – Hora de Ouro do Salvamento Veicular): controle estrito do tempo no fluxo completo do atendimento — da notificação do sinistro, passando pela chegada, estabilização, extração e transporte ao hospital.'},
  {d:'D', q:'Na análise do encarceramento veicular (apostila cap. 16), os dois itens principais avaliados são:', opts:['Estabilização e Extração','Triagem e Transporte','Acesso e Captura','Proteção e Diagnóstico','Zona Quente e Zona Fria'], ans:2, exp:'Apostila CBMPA, cap. 16 (p. 528 – Análise do Encarceramento): ACESSO = dificuldades de acesso ao compartimento onde a vítima está; CAPTURA = principal item da análise, grau de aprisionamento da vítima que define a técnica de desencarceramento.'},
  {d:'D', q:'O "afastamento de pedal" no salvamento veicular (apostila cap. 16) é uma técnica de desencarceramento utilizada quando:', opts:['O combustível vaza pelos pedais','Os pés ou pernas da vítima estão presos sob a coluna de pedal do veículo','O acelerador está eletricamente travado','O painel inteiro precisa ser deslocado para frente','A porta do motorista não abre por deformação'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 531 – Afastamento de Pedal): técnica aplicada quando os pedais aprisionam os pés/pernas da vítima. Utiliza ferramentas hidráulicas para deslocar a coluna de pedal, liberando o membro sem extração forçada.'},
  {d:'D', q:'Em ocorrências com veículos híbridos ou elétricos (apostila cap. 16), o comandante deve providenciar uma linha de proteção com militares equipados com EPI e EAPR devido ao risco de:', opts:['Explosão dos pneus pela alta tensão','Auto-ignição das baterias','Choque elétrico nos bombeiros pelo contato físico','Liberação de gases tóxicos pelos freios regenerativos','Curto-circuito pela água usada na extinção'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 537 – Veículos Híbridos e Elétricos): o comandante deve providenciar pelo menos uma linha de proteção com militares equipados com EPI e EAPR para o caso de auto-ignição das baterias. Para o desencarceramento, as técnicas são as mesmas de veículos convencionais.'},
  {d:'D', q:'A estabilização primária no salvamento veicular tem como principal objetivo:', opts:['Remover imediatamente o teto do veículo','Desconectar a bateria antes de qualquer ação','Permitir que os socorristas acessem o interior do veículo com segurança, impedindo movimentos inesperados','Iniciar a extração da vítima sem esperar','Criar espaço interno com ferramentas hidráulicas'], ans:2, exp:'Estabilização primária (apostila cap. 16): garantir que os socorristas possam acessar o veículo de forma rápida, eficaz e segura. Em cenários complexos, pode envolver outros veículos ou obstáculos ao redor.'},
],

tmi: [
  {d:'F', q:'O triângulo do fogo é composto por:', opts:['Calor, fumaça e combustível','Calor, comburente (O₂) e combustível','Calor, ignição e propagação','Combustível, faísca e pressão','Oxigênio, temperatura e pressão'], ans:1, exp:'Triângulo do fogo: Calor + Combustível + Comburente (O₂). Remover qualquer um extingue o fogo.'},
  {d:'F', q:'O agente extintor que atua por RESFRIAMENTO é:', opts:['Pó Químico Seco','CO₂','Halon','Água','Espuma química'], ans:3, exp:'Água: principal agente de resfriamento — absorve calor reduzindo a temperatura abaixo do ponto de ignição.'},
  {d:'F', q:'Incêndio classe "B" envolve:', opts:['Sólidos comuns (madeira, papel)','Líquidos e gases inflamáveis','Equipamentos elétricos energizados','Metais combustíveis','Gorduras e óleos de cozinha'], ans:1, exp:'Classe B: líquidos inflamáveis (gasolina, álcool, óleo) e gases (GLP, H₂). Extintores: CO₂, PQS, espuma.'},
  {d:'F', q:'O fenômeno de "flashover" em incêndio estrutural é (apostila cap. 13):', opts:['Explosão de gases no exterior','Ignição súbita generalizada — todos os materiais combustíveis do ambiente atingem a temperatura de ignição simultaneamente','Colapso do teto','Explosão de janelas por pressão','Saída súbita de fumaça pelo teto'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 369 – sec. 11.1 Flashover – Ignição Súbita Generalizada): é atribuído à robustez do calor proveniente do próprio fogo — todos os componentes gasosos da área são simultaneamente aquecidos à sua temperatura de ignição, iniciando uma inflamação geral dos gases/ambiente.'},
  {d:'F', q:'O extintor de CO₂ é indicado para incêndio em equipamentos elétricos porque:', opts:['Resfria melhor que a água','Não conduz eletricidade e não danifica equipamentos','É mais barato','Tem maior alcance','É obrigatório por norma'], ans:1, exp:'CO₂: não condutor elétrico, não deixa resíduo, sufoca o fogo. Ideal para equipamentos elétricos.'},
  {d:'F', q:'A linha de ataque direta em combate a incêndio estrutural posiciona a mangueira:', opts:['Perpendicular ao fogo','Entre a saída e o fogo, atacando a base das chamas','Atrás da equipe de resgate','No exterior do edifício','Acima do foco'], ans:1, exp:'Ataque direto: mangueira entre a saída de escape e o foco, aplicando água diretamente na base das chamas.'},
  {d:'M', q:'O "backdraft" (apostila cap. 13, sec. 11.2) ocorre quando:', opts:['O flashover produz explosão visível','Um ambiente com privação de O₂ recebe entrada súbita de ar — os gases inflamáveis acumulados inflamam explosivamente','O teto colapsa pelo calor','A fumaça acumulada cria nuvem combustível no exterior','A pressão interna derruba paredes'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 369 – sec. 11.2 Backdraft – Ignição Explosiva): a combustão incompleta por falta de O₂ produz gases inflamáveis. Quando uma abertura (porta/janela) é feita, o O₂ entra e esses gases se inflamam de forma explosiva. O backdraft é uma ignição deflagratória, não uma explosão de pressão.'},
  {d:'M', q:'O ponto de fulgor de um líquido inflamável é:', opts:['Temperatura de autoignição','Temperatura mínima na qual o líquido emite vapores suficientes para inflamar-se na presença de ignição','Temperatura de ebulição','Temperatura de extinção','Temperatura máxima de transporte'], ans:1, exp:'Ponto de fulgor (flash point): temperatura mínima para que o líquido libere vapores em concentração inflamável. Gasolina: -43°C; Etanol: 13°C.'},
  {d:'M', q:'Em incêndio em GLP (chama de tocha/jet fire), a técnica correta é:', opts:['Aplicar CO₂ diretamente','Resfriar o cilindro com água e fechar a válvula — NÃO extinguir sem fechar a válvula','Usar espuma mecânica','Afastar o cilindro com mangueira','Cobrir com lona'], ans:1, exp:'GLP em chama de tocha: não extinguir sem fechar a válvula — cria nuvem inflamável. Resfriar o recipiente e fechar a válvula primeiro.'},
  {d:'M', q:'O fenômeno "Boil Over" em incêndio de tanque com líquido combustível (apostila cap. 13, sec. 11.5) ocorre porque:', opts:['O tanque explode pela pressão dos gases','A água depositada no fundo do recipiente é aquecida, vaporiza e age como êmbolo empurrando o combustível quente para cima a grandes distâncias','O oxigênio no interior do tanque inflama os vapores','Os vapores do produto condensam e derramam pelas bordas','A parede do tanque racha pela dilatação térmica'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 11.5 Boil Over): a água, mais densa, deposita-se no fundo do recipiente. Submetida a altas temperaturas, vaporiza com enorme expansão (1 litro → ~1.700 litros de vapor). Esse vapor age como êmbolo numa seringa, empurrando o combustível quente para cima e arremessando-o a grandes distâncias.'},
  {d:'M', q:'A espuma mecânica aplicada sobre líquido inflamável age por:', opts:['Resfriamento apenas','Sufocamento (cobre a superfície) e resfriamento','Inibição química em cadeia','Diluição do combustível','Reação química com o líquido'], ans:1, exp:'Espuma: forma manta sobre o líquido (sufocamento, bloqueia O₂) e reduz a temperatura da superfície (resfriamento).'},
  {d:'M', q:'O equipamento de proteção respiratória para ambiente IDLH é:', opts:['Máscara facial com filtro P3','Respirador PFF2','SCBA (Self-Contained Breathing Apparatus)','Máscaras N95','Respirador de adução de ar'], ans:2, exp:'SCBA (AR autônomo): único EPI respiratório adequado para ambientes IDLH — fornece ar próprio independente da atmosfera.'},
  {d:'M', q:'A "linha de espera" (backup line) em operação interna de incêndio serve para:', opts:['Apoiar com mais água','Proteger a equipe de ataque caso haja inversão das chamas ou flashover','Resgatar vítimas','Controlar a saída de fumaça','Abastecer o carro pipa'], ans:1, exp:'Linha de espera (backup): posicionada atrás da linha de ataque, pronta para proteger a equipe caso haja deterioração rápida.'},
  {d:'M', q:'A técnica 3DWF (Tridimensional Water Fog) descrita na apostila cap. 13 baseia-se em:', opts:['Jato sólido contínuo dirigido à base das chamas','Pulsos curtos de jato neblinado com movimentos circulares que produzem vapor no volume da fumaça — trata o incêndio como fenômeno volumétrico','Aplicação de espuma pelo teto do compartimento','Ataque externo com linha de alta vazão','CO₂ em alta concentração para sufocar o ambiente'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 12.4 3DWF): técnica oriunda da Suécia (década de 1980), baseia-se no conceito de que o incêndio é volumétrico (não apenas na superfície sólida). Utiliza curtas rajadas de jato neblinado com movimentos circulares, gerando vapor no volume da fumaça para resfriar e retardar o flashover.'},
  {d:'D', q:'No "Ataque Indireto" descrito na apostila cap. 13 (sec. 12.2), o objetivo principal é:', opts:['Extinguir diretamente a fase sólida do combustível','Produzir grande quantidade de vapor d\'água aplicando jato no cômodo/gases quentes para resfriar os gases combustíveis e reduzir o risco de flashover','Ventilar o ambiente para retirar a fumaça','Criar uma barreira de água entre os bombeiros e as chamas','Usar CO₂ para sufocar os gases no teto'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 12.2 Ataque Indireto): o jato sólido ou compacto não combate diretamente a fase sólida — seu objetivo é produzir vapor d\'água para resfriar os gases combustíveis provenientes da combustão e da termólise, resfriando o cômodo e retardando o flashover. Contrasta com o Ataque Direto (sec. 12.1), que aplica jato diretamente na base das chamas.'},
  {d:'D', q:'O fogo classe "D" (metais combustíveis como magnésio) é extinto com:', opts:['Água abundante','CO₂','PQS BC','Areia seca ou agente especial Classe D','Espuma mecânica'], ans:3, exp:'Classe D: água reage violentamente com muitos metais. Usar areia seca, pó de grafite ou agentes especiais Classe D.'},
  {d:'D', q:'A técnica "ZOTI" (Pulso Longo de Alta Vazão) descrita na apostila cap. 13 (sec. 12.5) é aplicada:', opts:['Dentro do compartimento em chamas, com jato neblinado em círculos','Externamente à edificação, com pulso longo de jato para absorver grande quantidade de calor quando o ataque interno não é possível','Em tanques de GLP para resfriar antes do corte do gás','No teto do compartimento para gerar vapor e sufocar o fogo','Como primeiro jato ao entrar no ambiente sinistrado'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 12.5 ZOTI – Pulso Longo de Alta Vazão): atuação externa à edificação com o mesmo nível de desempenho do ataque interno. Ao combater um incêndio em fase de desenvolvimento completo, verifica-se que é necessário absorver grande quantidade de calor — o ZOTI utiliza pulso longo de alta vazão a partir do exterior, aplicável quando o modo ofensivo (ataque interno) não é viável.'},
  {d:'D', q:'O modo DEFENSIVO de combate a incêndio (apostila cap. 13) é adotado quando:', opts:['O fogo é pequeno e os bombeiros podem se aproximar com segurança','Os recursos disponíveis não são suficientes para o ataque ou a segurança dos bombeiros é comprometida — as equipes ficam fora da área de risco','O comandante decide poupar água da viatura','A vítima está presa dentro do edifício','A ventilação natural é suficiente para controlar a fumaça'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 375 – Modo Defensivo): empregado quando há risco elevado para os bombeiros (colapso iminente, fogo generalizado) ou recursos insuficientes. As linhas de mangueira são prolongadas até a área do fogo sem que a equipe entre no ambiente comprometido. Contrasta com o Modo Ofensivo (bombeiros próximos ao foco, exposto a queimaduras, queda de material e gases tóxicos) e o Modo Passivo (isolamento e proteção de edificações vizinhas).'},
