  {d:'D', q:'O "afastamento de pedal" no salvamento veicular (apostila cap. 16) é uma técnica de desencarceramento utilizada quando:', opts:['O combustível vaza pelos pedais','Os pés ou pernas da vítima estão presos sob a coluna de pedal do veículo','O acelerador está eletricamente travado','O painel inteiro precisa ser deslocado para frente','A porta do motorista não abre por deformação'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 531 – Afastamento de Pedal): técnica aplicada quando os pedais aprisionam os pés/pernas da vítima. Utiliza ferramentas hidráulicas para deslocar a coluna de pedal, liberando o membro sem extração forçada.'},
  {d:'D', q:'Em ocorrências com veículos híbridos ou elétricos (apostila cap. 16), o comandante deve providenciar uma linha de proteção com militares equipados com EPI e EAPR devido ao risco de:', opts:['Explosão dos pneus pela alta tensão','Auto-ignição das baterias','Choque elétrico nos bombeiros pelo contato físico','Liberação de gases tóxicos pelos freios regenerativos','Curto-circuito pela água usada na extinção'], ans:1, exp:'Apostila CBMPA, cap. 16 (p. 537 – Veículos Híbridos e Elétricos): o comandante deve providenciar pelo menos uma linha de proteção com militares equipados com EPI e EAPR para o caso de auto-ignição das baterias. Para o desencarceramento, as técnicas são as mesmas de veículos convencionais.'},
  {d:'D', q:'A estabilização primária no salvamento veicular tem como principal objetivo:', opts:['Remover imediatamente o teto do veículo','Desconectar a bateria antes de qualquer ação','Permitir que os socorristas acessem o interior do veículo com segurança, impedindo movimentos inesperados','Iniciar a extração da vítima sem esperar','Criar espaço interno com ferramentas hidráulicas'], ans:2, exp:'Estabilização primária (apostila cap. 16): garantir que os socorristas possam acessar o veículo de forma rápida, eficaz e segura. Em cenários complexos, pode envolver outros veículos ou obstáculos ao redor.'},
],

tmi: [
  {d:'F', q:'O triângulo do fogo é composto por:', opts:['Calor, fumaça e combustível','Calor, comburente (O₂) e combustível','Calor, ignição e propagação','Combustível, faísca e pressão','Oxigênio, temperatura e pressão'], ans:1, exp:'Triângulo do fogo: Calor + Combustível + Comburente (O₂). Remover qualquer um extingue o fogo.'},
  {d:'F', q:'O agente extintor que atua por RESFRIAMENTO é:', opts:['Pó Químico Seco','CO₂','Halon','Água','Espuma química'], ans:3, exp:'Água: principal agente de resfriamento — absorve calor reduzindo a temperatura abaixo do ponto de ignição.'},
  {d:'F', q:'Incêndio classe "B" envolve:', opts:['Sólidos comuns (madeira, papel)','Líquidos e gases inflamáveis','Equipamentos elétricos energizados','Metais combustíveis','Gorduras e óleos de cozinha'], ans:1, exp:'Classe B: líquidos inflamáveis (gasolina, álcool, óleo) e gases (GLP, H₂). Extintores: CO₂, PQS, espuma.'},
  {d:'F', q:'O fenômeno de "flashover" em incêndio estrutural é (apostila cap. 13):', opts:['Explosão de gases no exterior','Ignição súbita generalizada — todos os materiais combustíveis do ambiente atingem a temperatura de ignição simultaneamente','Colapso do teto','Explosão de janelas por pressão','Saída súbita de fumaça pelo teto'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 369 – sec. 11.1 Flashover – Ignição Súbita Generalizada): é atribuído à robustez do calor proveniente do próprio fogo — todos os componentes gasosos da área são simultaneamente aquecidos à sua temperatura de ignição, iniciando uma inflamação geral dos gases/ambiente.'},
  {d:'F', q:'O extintor de CO₂ é indicado para incêndio em equipamentos elétricos porque:', opts:['Resfria melhor que a água','Não conduz eletricidade e não danifica equipamentos','É mais barato','Tem maior alcance','É obrigatório por norma'], ans:1, exp:'CO₂: não condutor elétrico, não deixa resíduo, sufoca o fogo. Ideal para equipamentos elétricos.'},
  {d:'F', q:'A linha de ataque direta em combate a incêndio estrutural posiciona a mangueira:', opts:['Perpendicular ao fogo','Entre a saída e o fogo, atacando a base das chamas','Atrás da equipe de resgate','No exterior do edifício','Acima do foco'], ans:1, exp:'Ataque direto: mangueira entre a saída de escape e o foco, aplicando água diretamente na base das chamas.'},
  {d:'M', q:'O "backdraft" (apostila cap. 13, sec. 11.2) ocorre quando:', opts:['O flashover produz explosão visível','Um ambiente com privação de O₂ recebe entrada súbita de ar — os gases inflamáveis acumulados inflamam explosivamente','O teto colapsa pelo calor','A fumaça acumulada cria nuvem combustível no exterior','A pressão interna derruba paredes'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 369 – sec. 11.2 Backdraft – Ignição Explosiva): a combustão incompleta por falta de O₂ produz gases inflamáveis. Quando uma abertura (porta/janela) é feita, o O₂ entra e esses gases se inflamam de forma explosiva. O backdraft é uma ignição deflagratória, não uma explosão de pressão.'},
  {d:'M', q:'O ponto de fulgor de um líquido inflamável é:', opts:['Temperatura de autoignição','Temperatura mínima na qual o líquido emite vapores suficientes para inflamar-se na presença de ignição','Temperatura de ebulição','Temperatura de extinção','Temperatura máxima de transporte'], ans:1, exp:'Ponto de fulgor (flash point): temperatura mínima para que o líquido libere vapores em concentração inflamável. Gasolina: -43°C; Etanol: 13°C.'},
  {d:'M', q:'Em incêndio em GLP (chama de tocha/jet fire), a técnica correta é:', opts:['Aplicar CO₂ diretamente','Resfriar o cilindro com água e fechar a válvula — NÃO extinguir sem fechar a válvula','Usar espuma mecânica','Afastar o cilindro com mangueira','Cobrir com lona'], ans:1, exp:'GLP em chama de tocha: não extinguir sem fechar a válvula — cria nuvem inflamável. Resfriar o recipiente e fechar a válvula primeiro.'},
  {d:'M', q:'O fenômeno "Boil Over" em incêndio de tanque com líquido combustível (apostila cap. 13, sec. 11.5) ocorre porque:', opts:['O tanque explode pela pressão dos gases','A água depositada no fundo do recipiente é aquecida, vaporiza e age como êmbolo empurrando o combustível quente para cima a grandes distâncias','O oxigênio no interior do tanque inflama os vapores','Os vapores do produto condensam e derramam pelas bordas','A parede do tanque racha pela dilatação térmica'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 11.5 Boil Over): a água, mais densa, deposita-se no fundo do recipiente. Submetida a altas temperaturas, vaporiza com enorme expansão (1 litro → ~1.700 litros de vapor). Esse vapor age como êmbolo numa seringa, empurrando o combustível quente para cima e arremessando-o a grandes distâncias.'},
  {d:'M', q:'A espuma mecânica aplicada sobre líquido inflamável age por:', opts:['Resfriamento apenas','Sufocamento (cobre a superfície) e resfriamento','Inibição química em cadeia','Diluição do combustível','Reação química com o líquido'], ans:1, exp:'Espuma: forma manta sobre o líquido (sufocamento, bloqueia O₂) e reduz a temperatura da superfície (resfriamento).'},
  {d:'M', q:'O equipamento de proteção respiratória para ambiente IDLH é:', opts:['Máscara facial com filtro P3','Respirador PFF2','SCBA (Self-Contained Breathing Apparatus)','Máscaras N95','Respirador de adução de ar'], ans:2, exp:'SCBA (AR autônomo): único EPI respiratório adequado para ambientes IDLH — fornece ar próprio independente da atmosfera.'},
  {d:'M', q:'A "linha de espera" (backup line) em operação interna de incêndio serve para:', opts:['Apoiar com mais água','Proteger a equipe de ataque caso haja inversão das chamas ou flashover','Resgatar vítimas','Controlar a saída de fumaça','Abastecer o carro pipa'], ans:1, exp:'Linha de espera (backup): posicionada atrás da linha de ataque, pronta para proteger a equipe caso haja deterioração rápida.'},
  {d:'M', q:'A técnica 3DWF (Tridimensional Water Fog) descrita na apostila cap. 13 baseia-se em:', opts:['Jato sólido contínuo dirigido à base das chamas','Pulsos curtos de jato neblinado com movimentos circulares que produzem vapor no volume da fumaça — trata o incêndio como fenômeno volumétrico','Aplicação de espuma pelo teto do compartimento','Ataque externo com linha de alta vazão','CO₂ em alta concentração para sufocar o ambiente'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 12.4 3DWF): técnica oriunda da Suécia (década de 1980), baseia-se no conceito de que o incêndio é volumétrico (não apenas na superfície sólida). Utiliza curtas rajadas de jato neblinado com movimentos circulares, gerando vapor no volume da fumaça para resfriar e retardar o flashover.'},
  {d:'D', q:'No "Ataque Indireto" descrito na apostila cap. 13 (sec. 12.2), o objetivo principal é:', opts:['Extinguir diretamente a fase sólida do combustível','Produzir grande quantidade de vapor d\'água aplicando jato no cômodo/gases quentes para resfriar os gases combustíveis e reduzir o risco de flashover','Ventilar o ambiente para retirar a fumaça','Criar uma barreira de água entre os bombeiros e as chamas','Usar CO₂ para sufocar os gases no teto'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 12.2 Ataque Indireto): o jato sólido ou compacto não combate diretamente a fase sólida — seu objetivo é produzir vapor d\'água para resfriar os gases combustíveis provenientes da combustão e da termólise, resfriando o cômodo e retardando o flashover. Contrasta com o Ataque Direto (sec. 12.1), que aplica jato diretamente na base das chamas.'},
  {d:'D', q:'O fogo classe "D" (metais combustíveis como magnésio) é extinto com:', opts:['Água abundante','CO₂','PQS BC','Areia seca ou agente especial Classe D','Espuma mecânica'], ans:3, exp:'Classe D: água reage violentamente com muitos metais. Usar areia seca, pó de grafite ou agentes especiais Classe D.'},
  {d:'D', q:'A técnica "ZOTI" (Pulso Longo de Alta Vazão) descrita na apostila cap. 13 (sec. 12.5) é aplicada:', opts:['Dentro do compartimento em chamas, com jato neblinado em círculos','Externamente à edificação, com pulso longo de jato para absorver grande quantidade de calor quando o ataque interno não é possível','Em tanques de GLP para resfriar antes do corte do gás','No teto do compartimento para gerar vapor e sufocar o fogo','Como primeiro jato ao entrar no ambiente sinistrado'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 370 – sec. 12.5 ZOTI – Pulso Longo de Alta Vazão): atuação externa à edificação com o mesmo nível de desempenho do ataque interno. Ao combater um incêndio em fase de desenvolvimento completo, verifica-se que é necessário absorver grande quantidade de calor — o ZOTI utiliza pulso longo de alta vazão a partir do exterior, aplicável quando o modo ofensivo (ataque interno) não é viável.'},
  {d:'D', q:'O modo DEFENSIVO de combate a incêndio (apostila cap. 13) é adotado quando:', opts:['O fogo é pequeno e os bombeiros podem se aproximar com segurança','Os recursos disponíveis não são suficientes para o ataque ou a segurança dos bombeiros é comprometida — as equipes ficam fora da área de risco','O comandante decide poupar água da viatura','A vítima está presa dentro do edifício','A ventilação natural é suficiente para controlar a fumaça'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 375 – Modo Defensivo): empregado quando há risco elevado para os bombeiros (colapso iminente, fogo generalizado) ou recursos insuficientes. As linhas de mangueira são prolongadas até a área do fogo sem que a equipe entre no ambiente comprometido. Contrasta com o Modo Ofensivo (bombeiros próximos ao foco, exposto a queimaduras, queda de material e gases tóxicos) e o Modo Passivo (isolamento e proteção de edificações vizinhas).'},
  {d:'D', q:'A ventilação FORÇADA (apostila cap. 13, sec. 13.3) em combate a incêndio estrutural funciona com base no:', opts:['Uso de ventiladores elétricos posicionados nas janelas','Princípio de Bernoulli: linhas de mangueira pressurizadas criam fluxo de ar que arrasta e expele a fumaça na direção contrária','Abertura simultânea de todas as janelas e portas do pavimento','Uso de CO₂ para empurrar a fumaça para fora','Aquecimento do ar pelo fogo que naturalmente expele a fumaça'], ans:1, exp:'Apostila CBMPA, cap. 13 (p. 371 – sec. 13.3 Ventilação Forçada): emprega linhas de mangueira pressurizadas pelo Princípio de Bernoulli — o fluxo de água a alta velocidade cria um arraste do ar ao redor do jato, gerando fluxo que expele a fumaça na direção contrária à entrada das linhas. Exemplo: usar o jato das linhas de combate de dentro para fora do edifício para criar corrente de ar forçada.'},
  {d:'D', q:'A fórmula de Autonomia do EPR autônomo (apostila cap. 13, p. 360) é A = V × P / C. Num EPR de 10 litros, pressão 200 bar e consumo de 50 L/min, a autonomia é:', opts:['10 minutos','20 minutos','40 minutos','80 minutos','100 minutos'], ans:2, exp:'Apostila CBMPA, cap. 13 (p. 360): A = V × P / C, onde A = Autonomia (min), V = Volume do cilindro (L), P = Pressão de carga (bar), C = Consumo do usuário (L/min). Cálculo: A = 10 × 200 / 50 = 40 minutos. Nota: o consumo real varia com o esforço físico — em situação de combate intenso o consumo aumenta, reduzindo a autonomia real.'},
],

if: [
  {d:'F', q:'Os três tipos de incêndio florestal segundo a apostila cap. 14 são:', opts:['Primário, Secundário e Terciário','Subterrâneo, Superficial e Aéreo (de Copa)','Direto, Indireto e Combinado','Rasteiro, Médio e Alto','Latente, Ativo e Extinto'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 384): Subterrâneo (queima matéria orgânica e raízes abaixo do solo, sem chamas visíveis — mais difícil de detectar), Superficial (queima serrapilheira e vegetação baixa) e Aéreo/Copa (propaga-se pelas copas, o mais perigoso e de maior velocidade).'},
  {d:'F', q:'O principal agente extintor em incêndio florestal (apostila cap. 14) é:', opts:['CO₂','Espuma mecânica','Água','Pó Químico Seco','Retardante químico'], ans:2, exp:'Apostila CBMPA, cap. 14 (p. 394): a água é o principal agente extintor em incêndios florestais. A mochila costal (reservatório pressurizado de 20L), motobombas e linhas de mangueira são os principais equipamentos de aplicação de água no combate florestal.'},
  {d:'F', q:'A linha de controle/aceiro em incêndio florestal (apostila cap. 14) é:', opts:['Faixa de árvores densas plantadas como barreira','Faixa limpa de vegetação que interrompe a continuidade do combustível e impede o avanço do fogo','Faixa de solo encharcado com água','Faixa de retardante químico aspergido','Linha de bombeiros posicionados para conter o fogo'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 398): a linha de controle (aceiro) é uma faixa de terreno desmatada que elimina a continuidade do combustível, impedindo o avanço do fogo. Pode ser construída por ferramentas manuais (enxadão, Pulaski, McLeod) ou meios mecanizados. É o elemento central dos métodos direto e indireto.'},
  {d:'F', q:'O triângulo do incêndio florestal (apostila cap. 14) é formado por. Qual dos itens abaixo NÃO integra o triângulo?', opts:['Combustível','Topografia','Meteorologia (clima/vento/umidade)','Solo argiloso','Nenhum — todos os três formam o triângulo'], ans:3, exp:'Apostila CBMPA, cap. 14 (p. 384): o triângulo do incêndio florestal é composto por METEOROLOGIA (temperatura, umidade, vento, precipitação), TOPOGRAFIA (inclinação, exposição, relevo) e COMBUSTÍVEL (tipo, quantidade, umidade, continuidade). Solo argiloso não integra o triângulo.'},
  {d:'F', q:'A ferramenta "Pulaski" utilizada em incêndio florestal (apostila cap. 14) é:', opts:['Um equipamento motorizado para abrir aceiros','Uma ferramenta combinada com machado de um lado e enxada/picareta do outro, para cortar e escavar simultânea e alternar','Uma bomba costal de água pressurizada','Um abafador de borracha para chamas rasas','Um tipo de rádio de comunicação de campo'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 393 – Ferramentas Múltiplas/Pulaski): ferramenta dupla com machado de um lado para cortar galhos e vegetação, e enxada/picareta do outro para escavar e raspar o solo. É a ferramenta mais versátil para construção de linhas de contenção em terrenos florestais.'},
  {d:'F', q:'O incêndio de copa (aéreo) é o mais perigoso porque (apostila cap. 14):', opts:['Queima apenas a serrapilheira superficial','Propaga-se pelas copas das árvores com alta velocidade, podendo lançar focos secundários à frente da frente principal','Queima raízes abaixo do solo sem chamas visíveis','É o único que pode ser combatido com ataque direto','Se move contra o vento, surpreendendo as equipes'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 385): o incêndio de copa/aéreo propaga-se pelas copas das árvores. É o mais perigoso por sua alta velocidade, grande liberação de calor e capacidade de lançar material em brasa à frente da frente principal (focos secundários), dificultando enormemente o controle.'},
  {d:'M', q:'A umidade relativa do ar que indica maior perigo de incêndio florestal (apostila cap. 14) é:', opts:['Acima de 60%','Entre 40-60%','Entre 20-40%','Abaixo de 30% (especialmente < 20%)','Qualquer umidade com vento forte'], ans:3, exp:'Apostila CBMPA, cap. 14 (p. 391): a Umidade Relativa do ar é fator meteorológico crítico — abaixo de 30% (especialmente < 20%) o combustível florestal perde umidade rapidamente, diminui o ponto de ignição e aumenta drasticamente a velocidade de propagação e a intensidade do fogo.'},
  {d:'M', q:'A inclinação do terreno influencia a propagação do incêndio florestal porque (apostila cap. 14):', opts:['Terrenos planos favorecem a propagação em todas as direções igualmente','Em encostas ascendentes, os gases quentes sobem por convecção pré-aquecendo o combustível acima e acelerando a propagação morro acima','O calor desce para regiões mais baixas pela gravidade','Vales e ravinas diminuem a velocidade do fogo','A gravidade impede que o fogo suba encostas íngremes'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 388-389): em encostas ascendentes, os gases quentes da combustão sobem por convecção pré-aquecendo e secando o combustível acima. Isso faz o fogo subir encostas muito mais rápido que em terreno plano. A cada 10° de aumento na inclinação, a velocidade de propagação aproximadamente dobra.'},
  {d:'M', q:'O método de ataque INDIRETO em incêndio florestal (apostila cap. 14) é utilizado quando:', opts:['O fogo é de baixa intensidade e pode ser abordado diretamente','O fogo é de alta intensidade, tornando o ataque direto impossível — constrói-se linha de contenção à distância e usa-se contrafogo','Há abundância de água disponível no local','O vento está calmo e favorável à equipe','A Guarnição Reduzida tem poucos combatentes'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 397-398): Método Indireto — empregado quando a intensidade do incêndio é muito alta para o ataque direto (chamas superiores a 2,5m). A equipe constrói a linha de contenção a certa distância do fogo e utiliza contrafogo para eliminar o combustível entre a linha e o fogo principal.'},
  {d:'M', q:'O contrafogo (apostila cap. 14) consiste em:', opts:['Fogo acidental paralelo ao incêndio principal','Queima controlada e autorizada do combustível entre a linha de contenção e o incêndio principal, criando zona sem combustível','Fogo iniciado por descarga elétrica na frente do incêndio','Sistema de sprinklers ativado automaticamente','Uso de retardante químico para criar barreira de fogo'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 400): o contrafogo é a queima controlada do combustível situado entre a linha de contenção já estabelecida e o incêndio principal. Seu objetivo é criar uma zona sem combustível que impeça o avanço do fogo. Deve ser autorizado pelo Comandante da Operação e executado apenas em condições meteorológicas adequadas.'},
  {d:'M', q:'A "mochila costal" utilizada em incêndio florestal (apostila cap. 14) é:', opts:['Uma mochila com ferramentas manuais do combatente','Um reservatório pressurizado com capacidade de 20 litros de água, carregado nas costas, com esguicho para combate a pontos específicos','Um kit completo de EPI transportável','Um sistema de comunicação rádio portátil','Uma bomba motorizada de alta pressão'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 394): a Mochila Costal é equipamento essencial em incêndios florestais. Constituída de um reservatório com capacidade para 20 litros de água pressurizado e um esguicho para regulagem do fluxo, é carregada nas costas pelo combatente. Apresenta grande mobilidade e é indispensável para rescaldo e combate a pontos isolados.'},
  {d:'M', q:'O EPI Completo (Recomendado) para combate a incêndio florestal (apostila cap. 14) inclui, além do EPI básico:', opts:['Apenas colete refletivo e capacete padrão','Capacete com proteção facial, óculos de proteção, luvas e perneiras corta-matagal para maior proteção em operações complexas','Máscara de gás com filtro ABEK e escudo térmico completo','Roupa aluminizada para proteção contra calor radiante','Apenas botas de couro e capacete com lanterna'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 391): o EPI Completo (Recomendado) agrega ao básico equipamentos de maior proteção como capacete com proteção facial, óculos de proteção contra fagulhas, luvas resistentes ao calor e perneiras corta-matagal. É indicado para operações mais complexas e de maior risco.'},
  {d:'M', q:'A Guarnição Padrão (GP) de combate a incêndio florestal (apostila cap. 14) é composta por:', opts:['5 combatentes + 1 chefe de turma','10 combatentes divididos em 2 setores','27 homens, incluindo chefe, chefes de turma, combatentes e auxiliares','50 combatentes para incêndios de médio porte','100 ou mais combatentes — base da Guarnição Ampliada'], ans:2, exp:'Apostila CBMPA, cap. 14 (p. 395): Guarnição Padrão (GP) = 27 homens, organizada em chefe, auxiliares e combatentes divididos em setores. Abaixo: Guarnição Reduzida (GR) para operações menores. Acima: Guarnição Ampliada (GA) com efetivo superior a 100 homens para grandes incêndios.'},
  {d:'M', q:'A morfologia do incêndio florestal (apostila cap. 14): a "frente" do incêndio é:', opts:['O lado de onde o vento sopra, com menor intensidade','A parte lateral paralela à direção do vento','A parte de maior intensidade e velocidade que avança na direção do vento','A área já queimada atrás do fogo','O ponto original de ignição do incêndio'], ans:2, exp:'Apostila CBMPA, cap. 14 (p. 385 – Morfologia): FRENTE (ou cabeça) = parte de maior intensidade e velocidade, avança na direção do vento. FLANCOS = laterais paralelas ao vento. CAUDA/RETAGUARDA = oposta à frente, menor intensidade. ÁREA QUEIMADA = interior já consumido pelo fogo.'},
  {d:'D', q:'O incêndio SUBTERRÂNEO (apostila cap. 14) é considerado o mais difícil de combater porque:', opts:['Produz muita fumaça que desoriente e intoxica a equipe imediatamente','Queima matéria orgânica e raízes abaixo da superfície sem chamas visíveis, podendo permanecer ativo por dias e reacender após aparente extinção','Propaga-se pelas copas em alta velocidade','Produz gases tóxicos em concentração letal imediata','Avança contra o vento e é completamente imprevisível'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 384): o incêndio subterrâneo queima a matéria orgânica do solo (raízes, turfa, húmus) abaixo da superfície sem produzir chamas visíveis. É o mais difícil de detectar, monitorar e extinguir — pode permanecer latente por dias ou semanas e reacender espontaneamente após aparente extinção.'},
  {d:'D', q:'A "continuidade vertical" do combustível florestal (apostila cap. 14) refere-se a:', opts:['A quantidade total de biomassa por hectare de terreno','A ligação entre combustíveis em diferentes alturas (serrapilheira → sub-bosque → galhos baixos → copas), que permite ao fogo subir da superfície até as copas','A extensão horizontal da área coberta por combustível contínuo','A umidade do combustível medida em diferentes alturas','A densidade de árvores por hectare'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 388): Continuidade Vertical = conexão entre os combustíveis em diferentes estratos verticais — da serrapilheira, passando pelo sub-bosque, galhos baixos até as copas. Quando existe continuidade vertical, um incêndio de superfície pode escalar até se tornar incêndio de copa (aéreo), o mais perigoso. A Continuidade Horizontal define a extensão lateral.'},
  {d:'D', q:'O método COMBINADO de combate a incêndio florestal (apostila cap. 14) consiste em:', opts:['Usar aeronaves e equipes terrestres simultaneamente','Combinar alternada e simultaneamente as técnicas de ataque direto e indireto conforme as condições do terreno e intensidade do fogo em cada setor','Usar contrafogo e linha de controle nos dois lados opostos do incêndio ao mesmo tempo','Combinar ferramentas manuais com equipamentos motorizados no mesmo setor','Usar ataque indireto na frente e ataque direto nos flancos exclusivamente'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 398): Método Combinado — combina alternada e simultaneamente as técnicas de ataque direto e indireto. Aplicado quando o incêndio apresenta setores com diferentes intensidades ou condições variáveis de terreno, permitindo ataque direto onde a intensidade permite e indireto nos setores mais intensos.'},
  {d:'D', q:'O contrafogo em incêndio florestal (apostila cap. 14) deve ser realizado:', opts:['Por qualquer combatente que identifique condições favoráveis de vento','Somente por militares com mais de 10 anos de experiência em incêndio florestal','Apenas mediante autorização do Comandante da Operação, exigindo planejamento e condições meteorológicas adequadas','Automaticamente quando o fogo se aproxima a menos de 200m da linha de controle','Somente em terreno plano com vento calmo e estável'], ans:2, exp:'Apostila CBMPA, cap. 14 (p. 400): o contrafogo é técnica de alto risco que requer planejamento rigoroso, condições meteorológicas favoráveis e DEVE ser autorizado pelo Comandante da Operação. Um contrafogo mal executado pode sair de controle, ameaçar a guarnição e ampliar o incêndio. Requer linha de defesa estabelecida previamente.'},
  {d:'D', q:'O "abafador" utilizado em incêndio florestal (apostila cap. 14) é uma ferramenta que:', opts:['Lança água a alta pressão diretamente sobre as chamas','Consiste em haste com parte de borracha resistente ou tiras especiais para apagar chamas rasas por abafamento, batendo diretamente sobre elas','Serve para cortar árvores na abertura mecanizada de aceiros','Funciona como equipamento de comunicação rádio entre guarnições','Serve para raspar e remover combustível fino à frente do fogo'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 392): o Abafador é ferramenta básica para combate a incêndio florestal de baixa intensidade. Consiste em haste com parte de borracha resistente ao calor ou tiras de material especial, utilizado diretamente sobre as chamas para apagá-las por abafamento. É eficaz para fogo rasteiro (serrapilheira), mas inadequado para chamas altas ou incêndios de copa.'},
  {d:'D', q:'A ferramenta "McLeod" (apostila cap. 14) é classificada como ferramenta mista porque:', opts:['É fabricada com dois tipos de metal diferentes','Combina rastelo/ancinho de um lado (para raspar combustível) e enxada do outro (para escavar e construir aceiro) na mesma haste','É usada tanto por bombeiros terrestres como por aeronaves','Funciona tanto como ferramenta de corte quanto de comunicação','Pode ser usada tanto no ataque direto quanto para construção de linha de controle remota'], ans:1, exp:'Apostila CBMPA, cap. 14 (p. 393 – Ferramentas Múltiplas/McLeod): ferramenta dupla com rastelo/ancinho de um lado (para raspar e retirar folhas e material combustível) e enxada plana do outro (para escavar e nivelar o solo). É ferramenta mista fundamental na construção de linhas de controle em incêndios florestais.'},
],

// ── Estado ──────────────────────────────────────────────────────────────────
let currentSubject = null;
let currentQIdx = 0;
let userAnswers = [];
let completedSubjects = {};

// ── Render seletor ──────────────────────────────────────────────────────────
function renderSelector() {
  document.getElementById('hd-sub').textContent = 'Escolha uma matéria para iniciar';
  document.getElementById('prog').style.width = '0%';
  document.getElementById('subject-select').style.display = 'block';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('result-area').innerHTML = '';

  const grid = document.getElementById('subject-grid');
  grid.innerHTML = '';
  SUBJECTS.forEach(s => {
    const qs = QUESTIONS[s.id];
    const done = completedSubjects[s.id];
    const card = document.createElement('div');
    card.className = 'subj-card' + (done ? ' done' : '');
    card.innerHTML = `<span class="icon">${s.icon}</span><h3>${s.name}</h3><p>${done ? '✅ Concluída' : qs.length + ' questões · Fácil/Mod/Difícil'}</p>`;
    card.onclick = () => startSubject(s.id);
    grid.appendChild(card);
  });
}

// ── Iniciar matéria ─────────────────────────────────────────────────────────
function startSubject(id) {
  currentSubject = id;
  currentQIdx = 0;
  userAnswers = new Array(QUESTIONS[id].length).fill(null);

  document.getElementById('subject-select').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';

  const subj = SUBJECTS.find(s => s.id === id);
  document.getElementById('quiz-title').textContent = subj.icon + ' ' + subj.name;
  document.getElementById('hd-sub').textContent = subj.name;

  buildDots();
  renderQuestion();
}

// ── Dots ────────────────────────────────────────────────────────────────────
function buildDots() {
  const qs = QUESTIONS[currentSubject];
  const dotsDiv = document.getElementById('q-dots');
  dotsDiv.innerHTML = '';
  qs.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' current' : '');
    d.id = 'dot-' + i;
    d.onclick = () => { currentQIdx = i; renderQuestion(); };
    dotsDiv.appendChild(d);
  });
}

function updateDots() {
  const qs = QUESTIONS[currentSubject];
  qs.forEach((_, i) => {
    const d = document.getElementById('dot-' + i);
    if (!d) return;
    d.className = 'dot' + (userAnswers[i] !== null ? ' answered' : '') + (i === currentQIdx ? ' current' : '');
  });
}

// ── Render questão ──────────────────────────────────────────────────────────
function renderQuestion() {
  const qs = QUESTIONS[currentSubject];
  const q = qs[currentQIdx];
  const total = qs.length;

  document.getElementById('q-counter').textContent = (currentQIdx + 1) + ' / ' + total;
  document.getElementById('prog').style.width = ((currentQIdx + 1) / total * 100) + '%';

  const dbEl = document.getElementById('diff-badge');
  dbEl.className = 'diff-badge ' + DIFF_CLS[q.d];
  dbEl.textContent = DIFF_LABEL[q.d];

  document.getElementById('q-text').textContent = q.q;

  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML = '';
  q.opts.forEach((o, i) => {
    const div = document.createElement('div');
    div.className = 'opt' + (userAnswers[currentQIdx] === i ? ' selected' : '');
    div.innerHTML = `<span class="opt-l">${LETTERS[i]}</span><span>${o}</span>`;
    div.onclick = () => selectAnswer(i);
    optsDiv.appendChild(div);
  });

  const isLast = currentQIdx === total - 1;
  document.getElementById('btn-prev').style.display = currentQIdx === 0 ? 'none' : 'block';
  document.getElementById('btn-next').style.display = isLast ? 'none' : 'block';
  const submitBtn = document.getElementById('btn-submit');
  submitBtn.style.display = isLast ? 'block' : 'none';
  submitBtn.textContent = '📤 Enviar Simulado';

  updateDots();
}

function selectAnswer(i) {
  userAnswers[currentQIdx] = i;
  renderQuestion();
}

function prevQ() { if (currentQIdx > 0) { currentQIdx--; renderQuestion(); } }
function nextQ() { const total = QUESTIONS[currentSubject].length; if (currentQIdx < total - 1) { currentQIdx++; renderQuestion(); } }

// ── Submeter ────────────────────────────────────────────────────────────────
async function submitQuiz() {
  const unanswered = userAnswers.filter(a => a === null).length;
  if (unanswered > 0) {
    if (!confirm(`Você deixou ${unanswered} questão(ões) sem responder. Deseja enviar assim mesmo?`)) return;
  }
  const btn = document.getElementById('btn-submit');
  btn.textContent = '⏳ Enviando...';
  btn.disabled = true;
  showResult();
  // Envia email em paralelo (não bloqueia o gabarito)
  const qs = QUESTIONS[currentSubject];
  const subj = SUBJECTS.find(s => s.id === currentSubject);
  const correct = userAnswers.filter((a,i) => a === qs[i].ans).length;
  const pct = Math.round(correct / qs.length * 100);
  const subject = `Gabarito ${subj.name} – ${pct}%`;
  const body = `GABARITO – ${subj.name}\nAcertos: ${correct}/${qs.length} (${pct}%)\n\n` +
    qs.map((q,i) => userAnswers[i] !== q.ans
      ? `❌ Q${i+1} [${q.d}]: ${q.q.substring(0,80)}\nCerta: ${LETTERS[q.ans]} – ${q.opts[q.ans]}\nExp: ${q.exp}\n`
      : null).filter(Boolean).join('\n');
  sendResultEmail(subject, body);
}

// ── Resultado ────────────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';

  const qs = QUESTIONS[currentSubject];
  const subj = SUBJECTS.find(s => s.id === currentSubject);

  let correct = 0, diffStats = {F:{c:0,e:0,t:0},M:{c:0,e:0,t:0},D:{c:0,e:0,t:0}};
  qs.forEach((q, i) => {
    diffStats[q.d].t++;
    if (userAnswers[i] === q.ans) { correct++; diffStats[q.d].c++; }
    else diffStats[q.d].e++;
  });

  completedSubjects[currentSubject] = true;
  const pct = Math.round(correct / qs.length * 100);
  let emoji, msg;
  if (pct >= 90) { emoji='🏆'; msg='Excelente domínio desta matéria!'; }
  else if (pct >= 70) { emoji='✅'; msg='Bom! Revise os pontos errados.'; }
  else if (pct >= 50) { emoji='⚠️'; msg='Atenção! Estude mais esta matéria.'; }
  else { emoji='🚨'; msg='Reforce o estudo desta matéria!'; }

  function rbd(key, label, cls) {
    const {c,e,t} = diffStats[key];
    const p = t ? Math.round(c/t*100) : 0;
    return `<div class="rbd-card rbd-${cls}"><div class="rbd-title">${label}</div><div class="rbd-num">${c}/${t}</div><div class="rbd-sub">${p}% acertos · ${Math.round(e/t*100)||0}% erros</div></div>`;
  }

  // Gabarito
  const gabHtml = qs.map((q, i) => {
    const ua = userAnswers[i];
    const ok = ua === q.ans;
    const skip = ua === null;
    let cls = skip ? 'gq-skip' : ok ? 'gq-ok' : 'gq-err';
    const icon = skip ? '⬜' : ok ? '✅' : '❌';
    let ansHtml = '';
    if (!skip && !ok) {
      ansHtml += `<div class="gab-ans ga-err">❌ Sua resposta: ${LETTERS[ua]} – ${q.opts[ua]}</div>`;
      ansHtml += `<div class="gab-ans ga-correct">✅ Resposta correta: ${LETTERS[q.ans]} – ${q.opts[q.ans]}</div>`;
    } else if (ok) {
      ansHtml += `<div class="gab-ans ga-ok">✅ ${LETTERS[ua]} – ${q.opts[ua]}</div>`;
    } else {
      ansHtml += `<div class="gab-ans ga-err">⬜ Não respondida – Correta: ${LETTERS[q.ans]} – ${q.opts[q.ans]}</div>`;
    }
    return `<div class="gab-q ${cls}">
      <div class="gab-num">${icon} Questão ${i+1} · <span class="diff-badge ${DIFF_CLS[q.d]}" style="padding:2px 8px;font-size:9px">${DIFF_LABEL[q.d]}</span></div>
      <div class="gab-qtext">${q.q}</div>
      ${ansHtml}
      ${!ok ? `<div class="gab-exp">💡 ${q.exp}</div>` : ''}
    </div>`;
  }).join('');

  window._emailSubject = `Gabarito ${subj.name} – ${pct}%`;
  window._emailBody =
    `GABARITO – ${subj.name}\nAcertos: ${correct}/${qs.length} (${pct}%)\n\n` +
    `Facil: ${diffStats.F.c}/${diffStats.F.t}  Moderado: ${diffStats.M.c}/${diffStats.M.t}  Dificil: ${diffStats.D.c}/${diffStats.D.t}\n\n` +
    `QUESTOES ERRADAS:\n` +
    qs.map((q,i) => userAnswers[i] !== q.ans ? `Q${i+1} [${q.d}]: ${q.q.substring(0,70)}...\nCerta: ${LETTERS[q.ans]} – ${q.opts[q.ans]}\nExp: ${q.exp}\n` : null).filter(Boolean).join('\n');

  document.getElementById('result-area').innerHTML = `
    <div class="res-header">
      <div class="res-emoji">${emoji}</div>
      <div class="res-score">${correct}/${qs.length}</div>
      <div class="res-pct">${pct}% de aproveitamento · ${subj.icon} ${subj.name}</div>
      <div class="res-msg">${msg}</div>
      <div class="res-by-diff">
        ${rbd('F','🟢 Fácil','f')}${rbd('M','🟡 Moderado','m')}${rbd('D','🔴 Difícil','d')}
      </div>
    </div>

    <div class="gab-section">
      <div style="font-size:15px;font-weight:800;margin-bottom:14px">📋 Gabarito Comentado</div>
      ${gabHtml}
    </div>

    <div class="res-btns">
      <button class="rbtn rbtn-retry" onclick="startSubject('${currentSubject}')">🔄 Refazer</button>
      <button class="rbtn rbtn-menu" onclick="renderSelector()">📚 Outras Matérias</button>
      <button class="rbtn rbtn-email" id="email-btn" onclick="sendResultEmail(window._emailSubject, window._emailBody)" style="display:none"></button>
    </div>
  `;

  document.getElementById('hd-sub').textContent = subj.name + ' – Gabarito';
  document.getElementById('prog').style.width = '100%';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Email via FormSubmit.co (sem conta, sem chave) ──────────────────────────
async function sendResultEmail(subject, body) {
  try {
    await fetch('https://formsubmit.co/ajax/callegaribi@gmail.com', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
      body: JSON.stringify({
        _subject: subject,
        message: body,
        _captcha: 'false',
        _template: 'table'
      })
    });
  } catch(e) { console.error('Erro ao enviar email:', e); }
}

// ── Init: se vier com hash (#im, #dc…) vai direto, sem mostrar o seletor ───
const _hash = window.location.hash.replace('#','').toLowerCase();
if (_hash && QUESTIONS[_hash]) {
  startSubject(_hash);
} else {
  renderSelector();
}
</script>
</body>
</html>
